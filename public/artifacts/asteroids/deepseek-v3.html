<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
        }
        canvas {
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        const ship = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            angle: 0,
            rotationSpeed: 0.05,
            thrusting: false,
            thrust: {
                x: 0,
                y: 0
            },
            thrustPower: 0.1,
            friction: 0.99
        };

        const keys = {
            ArrowLeft: false,
            ArrowRight: false,
            ArrowUp: false
        };

        const bullets = [];
        const asteroids = [];
        const asteroidCount = 5;

        function createAsteroids() {
            for (let i = 0; i < asteroidCount; i++) {
                asteroids.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 40 + 20,
                    speed: Math.random() * 2 + 1,
                    angle: Math.random() * Math.PI * 2
                });
            }
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            ctx.beginPath();
            ctx.moveTo(0, -ship.radius);
            ctx.lineTo(ship.radius * 0.8, ship.radius * 0.8);
            ctx.lineTo(-ship.radius * 0.8, ship.radius * 0.8);
            ctx.closePath();
            ctx.strokeStyle = 'white';
            ctx.stroke();
            ctx.restore();
        }

        function drawBullets() {
            bullets.forEach((bullet, index) => {
                bullet.x += bullet.speed * Math.cos(bullet.angle);
                bullet.y += bullet.speed * Math.sin(bullet.angle);

                if (bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                    bullets.splice(index, 1);
                }

                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
            });
        }

        function drawAsteroids() {
            asteroids.forEach(asteroid => {
                asteroid.x += asteroid.speed * Math.cos(asteroid.angle);
                asteroid.y += asteroid.speed * Math.sin(asteroid.angle);

                if (asteroid.x < -asteroid.radius) asteroid.x = canvas.width + asteroid.radius;
                if (asteroid.x > canvas.width + asteroid.radius) asteroid.x = -asteroid.radius;
                if (asteroid.y < -asteroid.radius) asteroid.y = canvas.height + asteroid.radius;
                if (asteroid.y > canvas.height + asteroid.radius) asteroid.y = -asteroid.radius;

                ctx.beginPath();
                ctx.arc(asteroid.x, asteroid.y, asteroid.radius, 0, Math.PI * 2);
                ctx.strokeStyle = 'white';
                ctx.stroke();
            });
        }

        function updateShip() {
            if (keys.ArrowLeft) ship.angle -= ship.rotationSpeed;
            if (keys.ArrowRight) ship.angle += ship.rotationSpeed;
            if (keys.ArrowUp) {
                ship.thrusting = true;
                ship.thrust.x += Math.cos(ship.angle) * ship.thrustPower;
                ship.thrust.y += Math.sin(ship.angle) * ship.thrustPower;
            } else {
                ship.thrusting = false;
            }

            ship.thrust.x *= ship.friction;
            ship.thrust.y *= ship.friction;
            ship.x += ship.thrust.x;
            ship.y += ship.thrust.y;

            if (ship.x < -ship.radius) ship.x = canvas.width + ship.radius;
            if (ship.x > canvas.width + ship.radius) ship.x = -ship.radius;
            if (ship.y < -ship.radius) ship.y = canvas.height + ship.radius;
            if (ship.y > canvas.height + ship.radius) ship.y = -ship.radius;
        }

        function shootBullet() {
            bullets.push({
                x: ship.x,
                y: ship.y,
                speed: 5,
                angle: ship.angle
            });
        }

        function handleKeyDown(e) {
            if (e.code in keys) {
                keys[e.code] = true;
            }
            if (e.code === 'Space') {
                shootBullet();
            }
        }

        function handleKeyUp(e) {
            if (e.code in keys) {
                keys[e.code] = false;
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updateShip();
            drawShip();
            drawBullets();
            drawAsteroids();
            requestAnimationFrame(gameLoop);
        }

        createAsteroids();
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        gameLoop();
    </script>
</body>
</html>
