<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroids</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #000;
        color: #fff;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }
    #gameContainer {
        position: relative;
    }
    canvas {
        border: 2px solid #333;
        background: #000;
        display: block;
    }
    #info {
        margin-top: 10px;
        font-size: 14px;
        color: #888;
        text-align: center;
    }
    #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.75);
        text-align: center;
    }
    #overlay h1 {
        font-size: 48px;
        margin-bottom: 20px;
        letter-spacing: 4px;
        text-shadow: 0 0 20px #0ff;
    }
    #overlay p {
        font-size: 18px;
        margin: 8px 0;
        color: #ccc;
    }
    .hidden { display: none !important; }
    .blink { animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div id="gameContainer">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="overlay">
        <h1>ASTEROIDS</h1>
        <p>Arrow Keys / WASD to move &amp; rotate</p>
        <p>Space to shoot &nbsp;•&nbsp; Shift to hyperspace</p>
        <p class="blink" style="margin-top:20px;color:#0ff">Press ENTER to Start</p>
    </div>
</div>
<div id="info">Score: <span id="score">0</span> &nbsp;|&nbsp; Lives: <span id="lives">3</span> &nbsp;|&nbsp; Level: <span id="level">1</span> &nbsp;|&nbsp; High: <span id="high">0</span></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const highEl = document.getElementById('high');

let highScore = 0;
highEl.textContent = highScore;

const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
    if (e.code === 'Enter' && (state === 'start' || state === 'gameover')) startGame();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

let state = 'start'; // start, playing, gameover
let ship, asteroids, bullets, particles, score, lives, level;

function rand(min, max) { return Math.random() * (max - min) + min; }

function wrap(obj) {
    if (obj.x < 0) obj.x += W;
    if (obj.x > W) obj.x -= W;
    if (obj.y < 0) obj.y += H;
    if (obj.y > H) obj.y -= H;
}

function createShip() {
    return {
        x: W/2, y: H/2, angle: -Math.PI/2,
        vx: 0, vy: 0, radius: 12,
        thrusting: false,
        canShoot: true,
        invincible: 120,
        blink: 0
    };
}

function createAsteroid(x, y, size) {
    const speed = rand(0.5, 1.5) * (4 - size) * 0.6;
    const angle = rand(0, Math.PI * 2);
    // create jagged shape
    const verts = [];
    const n = Math.floor(rand(8, 13));
    const baseR = size * 18;
    for (let i = 0; i < n; i++) {
        verts.push(rand(0.7, 1.3));
    }
    return {
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: baseR,
        size, // 3=large, 2=medium, 1=small
        angle: rand(0, Math.PI*2),
        spin: rand(-0.03, 0.03),
        verts, n
    };
}

function spawnLevel(lvl) {
    asteroids = [];
    const count = 3 + lvl;
    for (let i = 0; i < count; i++) {
        let x, y;
        // spawn away from ship
        do {
            x = rand(0, W);
            y = rand(0, H);
        } while (Math.hypot(x - W/2, y - H/2) < 150);
        asteroids.push(createAsteroid(x, y, 3));
    }
}

function startGame() {
    state = 'playing';
    overlay.classList.add('hidden');
    score = 0; lives = 3; level = 1;
    bullets = []; particles = [];
    ship = createShip();
    spawnLevel(level);
    updateHUD();
}

function updateHUD() {
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
    highEl.textContent = highScore;
}

function explode(x, y, count, color) {
    for (let i = 0; i < count; i++) {
        const a = rand(0, Math.PI*2);
        const s = rand(0.5, 3);
        particles.push({
            x, y,
            vx: Math.cos(a)*s, vy: Math.sin(a)*s,
            life: rand(20, 45), maxLife: 45,
            color: color || '#fff'
        });
    }
}

function shoot() {
    bullets.push({
        x: ship.x + Math.cos(ship.angle) * ship.radius,
        y: ship.y + Math.sin(ship.angle) * ship.radius,
        vx: Math.cos(ship.angle) * 7 + ship.vx,
        vy: Math.sin(ship.angle) * 7 + ship.vy,
        life: 60
    });
}

function hyperspace() {
    ship.x = rand(0, W);
    ship.y = rand(0, H);
    ship.vx = 0; ship.vy = 0;
    ship.invincible = 60;
    explode(ship.x, ship.y, 15, '#0ff');
}

function shipDie() {
    explode(ship.x, ship.y, 30, '#f80');
    lives--;
    updateHUD();
    if (lives <= 0) {
        state = 'gameover';
        if (score > highScore) highScore = score;
        showGameOver();
    } else {
        ship = createShip();
    }
}

function showGameOver() {
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
        <h1>GAME OVER</h1>
        <p>Final Score: ${score}</p>
        <p>High Score: ${highScore}</p>
        <p class="blink" style="margin-top:20px;color:#0ff">Press ENTER to Play Again</p>
    `;
}

function update() {
    if (state !== 'playing') return;

    // Ship controls
    if (keys['ArrowLeft'] || keys['KeyA']) ship.angle -= 0.07;
    if (keys['ArrowRight'] || keys['KeyD']) ship.angle += 0.07;
    ship.thrusting = keys['ArrowUp'] || keys['KeyW'];
    if (ship.thrusting) {
        ship.vx += Math.cos(ship.angle) * 0.15;
        ship.vy += Math.sin(ship.angle) * 0.15;
        // thrust particles
        if (Math.random() < 0.7) {
            particles.push({
                x: ship.x - Math.cos(ship.angle)*ship.radius,
                y: ship.y - Math.sin(ship.angle)*ship.radius,
                vx: -Math.cos(ship.angle)*rand(1,3) + rand(-0.5,0.5),
                vy: -Math.sin(ship.angle)*rand(1,3) + rand(-0.5,0.5),
                life: 15, maxLife: 15, color: '#f80'
            });
        }
    }
    // friction & max speed
    ship.vx *= 0.99; ship.vy *= 0.99;
    const sp = Math.hypot(ship.vx, ship.vy);
    if (sp > 8) { ship.vx = ship.vx/sp*8; ship.vy = ship.vy/sp*8; }
    ship.x += ship.vx; ship.y += ship.vy;
    wrap(ship);
    if (ship.invincible > 0) ship.invincible--;
    ship.blink++;

    // Shooting
    if (keys['Space'] && ship.canShoot) {
        shoot();
        ship.canShoot = false;
    }
    if (!keys['Space']) ship.canShoot = true;

    // Hyperspace
    if ((keys['ShiftLeft'] || keys['ShiftRight']) && ship.invincible <= 0) {
        hyperspace();
    }

    // Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        wrap(b);
        b.life--;
        if (b.life <= 0) bullets.splice(i, 1);
    }

    // Asteroids
    for (const a of asteroids) {
        a.x += a.vx; a.y += a.vy;
        a.angle += a.spin;
        wrap(a);
    }

    // Bullet-asteroid collision
    for (let i = asteroids.length - 1; i >= 0; i--) {
        const a = asteroids[i];
        for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(a.x - b.x, a.y - b.y) < a.radius) {
                bullets.splice(j, 1);
                asteroids.splice(i, 1);
                score += (4 - a.size) * 20;
                explode(a.x, a.y, 12, '#aaa');
                if (a.size > 1) {
                    asteroids.push(createAsteroid(a.x, a.y, a.size - 1));
                    asteroids.push(createAsteroid(a.x, a.y, a.size - 1));
                }
                updateHUD();
                break;
            }
        }
    }

    // Ship-asteroid collision
    if (ship.invincible <= 0) {
        for (const a of asteroids) {
            if (Math.hypot(a.x - ship.x, a.y - ship.y) < a.radius + ship.radius) {
                shipDie();
                break;
            }
        }
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Level clear
    if (asteroids.length === 0 && state === 'playing') {
        level++;
        updateHUD();
        spawnLevel(level);
        ship.invincible = 60;
    }
}

function drawShip() {
    if (ship.invincible > 0 && Math.floor(ship.blink / 5) % 2 === 0) return;
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(14, 0);
    ctx.lineTo(-10, -9);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-10, 9);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
}

function drawAsteroid(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.angle);
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < a.n; i++) {
        const ang = (i / a.n) * Math.PI * 2;
        const r = a.radius * a.verts[i];
        const x = Math.cos(ang) * r;
        const y = Math.sin(ang) * r;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
}

function render() {
    ctx.clearRect(0, 0, W, H);

    if (state === 'playing' || state === 'gameover') {
        // particles
        for (const p of particles) {
            ctx.globalAlpha = p.life / p.maxLife;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 1, p.y - 1, 2.5, 2.5);
        }
        ctx.globalAlpha = 1;

        // bullets
        ctx.fillStyle = '#fff';
        for (const b of bullets) {
            ctx.beginPath();
            ctx.arc(b.x, b.y, 2, 0, Math.PI*2);
            ctx.fill();
        }

        // asteroids
        for (const a of asteroids) drawAsteroid(a);

        // ship
        if (state === 'playing') drawShip();
    }
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
