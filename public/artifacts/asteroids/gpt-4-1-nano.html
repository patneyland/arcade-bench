<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Asteroids Game</title>
<style>
  body { margin: 0; background: black; overflow: hidden; }
  canvas { display: block; margin: 0 auto; background: #000; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const width = canvas.width;
const height = canvas.height;

let keys = {};

window.addEventListener('keydown', e => { keys[e.key] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; });

class Vector {
    constructor(x, y) {
        this.x = x;
        this.y = y;
    }
    add(v) {
        this.x += v.x;
        this.y += v.y;
        return this;
    }
    subtract(v) {
        this.x -= v.x;
        this.y -= v.y;
        return this;
    }
    multiply(s) {
        this.x *= s;
        this.y *= s;
        return this;
    }
    get length() {
        return Math.hypot(this.x, this.y);
    }
    normalize() {
        const len = this.length;
        if (len > 0) {
            this.x /= len;
            this.y /= len;
        }
        return this;
    }
    clone() {
        return new Vector(this.x, this.y);
    }
}

class Ship {
    constructor() {
        this.position = new Vector(width/2, height/2);
        this.velocity = new Vector(0, 0);
        this.angle = 0;
        this.size = 20;
        this.rotationSpeed = 0;
        this.thrusting = false;
    }
    update() {
        if (keys['ArrowLeft']) this.angle -= 0.05;
        if (keys['ArrowRight']) this.angle += 0.05;
        if (keys['ArrowUp']) {
            this.thrusting = true;
            const thrust = new Vector(Math.cos(this.angle), Math.sin(this.angle));
            thrust.multiply(0.1);
            this.velocity.add(thrust);
        } else {
            this.thrusting = false;
        }
        this.position.add(this.velocity);
        // Wrap around screen edges
        if (this.position.x < 0) this.position.x += width;
        if (this.position.x > width) this.position.x -= width;
        if (this.position.y < 0) this.position.y += height;
        if (this.position.y > height) this.position.y -= height;
        // Apply some friction
        this.velocity.multiply(0.99);
    }
    draw() {
        ctx.save();
        ctx.translate(this.position.x, this.position.y);
        ctx.rotate(this.angle);
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(15, 0);
        ctx.lineTo(-10, 10);
        ctx.lineTo(-10, -10);
        ctx.closePath();
        ctx.stroke();

        if (this.thrusting) {
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            ctx.lineTo(-15, 5);
            ctx.lineTo(-15, -5);
            ctx.closePath();
            ctx.stroke();
        }
        ctx.restore();
    }
}

class Asteroid {
    constructor(position, velocity, size) {
        this.position = position;
        this.velocity = velocity;
        this.size = size; // radius
        this.vertices = [];
        const points = Math.floor(7 + Math.random() * 3);
        for (let i=0; i<points; i++) {
            this.vertices.push(Math.random() * Math.PI * 2);
        }
        this.color = 'gray';
    }

    update() {
        this.position.add(this.velocity);
        // Wrap around
        if (this.position.x < 0) this.position.x += width;
        if (this.position.x > width) this.position.x -= width;
        if (this.position.y < 0) this.position.y += height;
        if (this.position.y > height) this.position.y -= height;
    }

    draw() {
        ctx.save();
        ctx.translate(this.position.x, this.position.y);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i=0; i<this.vertices.length; i++) {
            const angle = this.vertices[i];
            const r = this.size + Math.random() * 10;
            const x = Math.cos(angle) * r;
            const y = Math.sin(angle) * r;
            if (i === 0) {
                ctx.moveTo(x, y);
            } else {
                ctx.lineTo(x, y);
            }
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
    }

    breakIntoFragments() {
        const fragments = [];
        const size = this.size / 2;
        for (let i=0; i<2; i++) {
            const vel = this.velocity.clone();
            vel.add(new Vector((Math.random()-0.5)*2, (Math.random()-0.5)*2));
            fragments.push(new Asteroid(this.position.clone(), vel, size));
        }
        return fragments;
    }
}

class Bullet {
    constructor(position, velocity) {
        this.position = position.clone();
        this.velocity = velocity.clone();
        this.life = 60; // frames
        this.radius = 2;
    }

    update() {
        this.position.add(this.velocity);
        this.life--;
        // Wrap around
        if (this.position.x < 0) this.position.x += width;
        if (this.position.x > width) this.position.x -= width;
        if (this.position.y < 0) this.position.y += height;
        if (this.position.y > height) this.position.y -= height;
    }

    draw() {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(this.position.x, this.position.y, this.radius, 0, Math.PI*2);
        ctx.fill();
    }
}

// Game objects
const ship = new Ship();
const asteroids = [];
const bullets = [];

let spawnTimer = 0;
let score = 0;
let gameOver = false;

function spawnAsteroid() {
    let position;
    // Spawn at edge
    const edge = Math.floor(Math.random() * 4);
    if (edge === 0) { // Top
        position = new Vector(Math.random() * width, 0);
    } else if (edge === 1) { // Bottom
        position = new Vector(Math.random() * width, height);
    } else if (edge === 2) { // Left
        position = new Vector(0, Math.random() * height);
    } else { // Right
        position = new Vector(width, Math.random() * height);
    }
    const velocity = new Vector((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2);
    const size = 30 + Math.random() * 20;
    asteroids.push(new Asteroid(position, velocity, size));
}

// Initialize some asteroids
for (let i=0; i<5; i++) {
    spawnAsteroid();
}

function handleInput() {
    if (keys[' ']) { // Space for shooting
        if (!ship.shootCooldown || ship.shootCooldown <= 0) {
            shoot();
            ship.shootCooldown = 15; // frames
        }
    }
    if (ship.shootCooldown && ship.shootCooldown > 0) {
        ship.shootCooldown--;
    }
}

function shoot() {
    const dir = new Vector(Math.cos(ship.angle), Math.sin(ship.angle));
    const pos = ship.position.clone().add(dir.clone().multiply(ship.size));
    const vel = dir.clone().multiply(5).add(ship.velocity.clone());
    bullets.push(new Bullet(pos, vel));
}

function checkCollisions() {
    // Check bullets with asteroids
    for (let i=bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        for (let j=asteroids.length -1; j >=0; j--) {
            const asteroid = asteroids[j];
            const dist = Math.hypot(bullet.position.x - asteroid.position.x, bullet.position.y - asteroid.position.y);
            if (dist < asteroid.size) {
                // Destroy asteroid and bullet
                asteroids.splice(j,1);
                bullets.splice(i,1);
                // Fragment asteroid if large enough
                if (asteroid.size > 15) {
                    const fragments = asteroid.breakIntoFragments();
                    asteroids.push(...fragments);
                }
                score += 100;
                break;
            }
        }
    }

    // Check ship with asteroids
    for (let j=0; j<asteroids.length; j++) {
        const asteroid = asteroids[j];
        const dist = Math.hypot(ship.position.x - asteroid.position.x, ship.position.y - asteroid.position.y);
        if (dist < asteroid.size) {
            gameOver = true;
            break;
        }
    }
}

function update() {
    if (gameOver) return;
    handleInput();
    ship.update();

    // Update asteroids
    for (let asteroid of asteroids) {
        asteroid.update();
    }

    // Update bullets
    for (let i=bullets.length -1; i >=0; i--) {
        bullets[i].update();
        if (bullets[i].life <= 0) bullets.splice(i,1);
    }

    // Spawn new asteroids over time
    spawnTimer++;
    if (spawnTimer > 150 && asteroids.length < 12) {
        spawnAsteroid();
        spawnTimer = 0;
    }

    // Check collisions
    checkCollisions();
}

function draw() {
    ctx.clearRect(0, 0, width, height);

    ship.draw();

    for (let asteroid of asteroids) {
        asteroid.draw();
    }

    for (let bullet of bullets) {
        bullet.draw();
    }

    // Draw score
    ctx.fillStyle = 'white';
    ctx.font = '20px Arial';
    ctx.fillText('Score: ' + score, 20, 30);

    if (gameOver) {
        ctx.fillStyle = 'white';
        ctx.font = '50px Arial';
        ctx.fillText('Game Over', width/2 - 130, height/2);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
