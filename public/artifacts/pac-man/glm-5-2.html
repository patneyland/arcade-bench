<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PAC-MAN</title>
<style>
  :root{
    --bg:#05050f;
    --wall:#1e3bff;
    --wall-glow:#4f6bff;
    --dot:#ffd9a8;
    --power:#ffcf3a;
    --pac:#ffe44d;
    --text:#ffe44d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(ellipse at center, #0a0a25 0%, #02020a 70%);
    font-family:'Courier New',monospace;
    color:var(--text);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    overflow:hidden;
    user-select:none;
  }
  h1{
    font-size:42px;
    letter-spacing:14px;
    color:var(--pac);
    text-shadow:0 0 18px rgba(255,228,77,.7), 0 0 40px rgba(255,228,77,.35);
    margin-bottom:6px;
  }
  .wrap{
    position:relative;
    padding:14px;
    border:2px solid #1e3bff;
    border-radius:10px;
    background:#000;
    box-shadow:0 0 0 4px #000, 0 0 30px rgba(30,59,255,.4), inset 0 0 30px rgba(30,59,255,.15);
  }
  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:100%;
    padding:4px 8px 10px;
    font-size:14px;
    letter-spacing:2px;
  }
  .hud .label{color:#7c83ff;font-size:11px;display:block}
  .hud .val{color:#fff;font-size:22px;font-weight:bold;text-shadow:0 0 8px rgba(255,255,255,.4)}
  .lives{display:flex;gap:6px;align-items:center}
  .life{width:18px;height:18px;border-radius:50%;background:var(--pac);box-shadow:0 0 8px var(--pac);clip-path:polygon(0 0, 100% 0, 100% 40%, 50% 50%, 100% 60%, 100% 100%, 0 100%)}
  canvas{display:block;background:#000;image-rendering:pixelated}
  .overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,.85);
    z-index:5;
    text-align:center;
    padding:20px;
  }
  .overlay h2{font-size:34px;letter-spacing:6px;margin-bottom:12px;color:var(--pac);text-shadow:0 0 16px rgba(255,228,77,.6)}
  .overlay p{font-size:14px;color:#aab0ff;line-height:1.8;max-width:380px}
  .overlay .hint{margin-top:18px;font-size:12px;color:#6c72d8}
  .btn{
    margin-top:22px;
    padding:12px 28px;
    background:transparent;
    color:var(--pac);
    border:2px solid var(--pac);
    font-family:inherit;
    font-size:16px;
    letter-spacing:4px;
    cursor:pointer;
    transition:all .15s;
  }
  .btn:hover{background:var(--pac);color:#000;box-shadow:0 0 24px rgba(255,228,77,.7)}
  .hidden{display:none!important}
  .controls{margin-top:14px;font-size:11px;color:#6c72d8;letter-spacing:2px}
</style>
</head>
<body>
  <h1>PAC-MAN</h1>
  <div class="wrap">
    <div class="hud">
      <div><span class="label">SCORE</span><span class="val" id="score">0</span></div>
      <div style="text-align:center"><span class="label">LEVEL</span><span class="val" id="level">1</span></div>
      <div class="lives" id="lives"></div>
    </div>
    <canvas id="game" width="448" height="496"></canvas>
    <div class="overlay" id="overlay">
      <h2>READY</h2>
      <p>Eat all the dots, avoid the ghosts.<br>Grab a power pellet to turn the tables.</p>
      <button class="btn" id="startBtn">START</button>
      <div class="hint">Arrow keys / WASD to move &nbsp;·&nbsp; P to pause</div>
    </div>
  </div>
  <div class="controls">↑ ↓ ← → &nbsp; · &nbsp; W A S D &nbsp; · &nbsp; P PAUSE</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const TILE = 16;
  const COLS = 28;
  const ROWS = 31;

  // Maze legend
  // # = wall, . = dot, o = power pellet, ' ' = empty, - = ghost door, P = pac spawn
  const MAZE_TEMPLATE = [
    "############################",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#o####.#####.##.#####.####o#",
    "#.####.#####.##.#####.####.#",
    "#..........................#",
    "#.####.##.########.##.####.#",
    "#.####.##.########.##.####.#",
    "#......##....##....##......#",
    "######.##### ## #####.######",
    "     #.##### ## #####.#     ",
    "     #.##          ##.#     ",
    "     #.## ###--### ##.#     ",
    "######.## #      # ##.######",
    "      .   #      #   .      ",
    "######.## #      # ##.######",
    "     #.## ######## ##.#     ",
    "     #.##          ##.#     ",
    "     #.## ######## ##.#     ",
    "######.## ######## ##.######",
    "#............##............#",
    "#.####.#####.##.#####.####.#",
    "#.####.#####.##.#####.####.#",
    "#o..##.......  .......##..o#",
    "###.##.##.########.##.##.###",
    "###.##.##.########.##.##.###",
    "#......##....##....##......#",
    "#.##########.##.##########.#",
    "#.##########.##.##########.#",
    "#..........................#",
    "############################"
  ];

  // Game state
  let grid;          // 2D array of cells
  let dotsRemaining;
  let score, level, lives;
  let state;         // 'ready' | 'playing' | 'paused' | 'dying' | 'won' | 'gameover'
  let stateTimer;
  let mode;          // 'scatter' | 'chase' | 'frightened' | 'eaten'
  let modeTimer;
  let modeIndex;
  const modeSchedule = [ // (duration in ms, mode)
    [7000, 'scatter'], [20000, 'chase'],
    [7000, 'scatter'], [20000, 'chase'],
    [5000, 'scatter'], [20000, 'chase'],
    [5000, 'scatter'], [Infinity, 'chase']
  ];
  let frightenedTimer;
  let pacman, ghosts;
  let pellets; // list of {x,y,power} for rendering pulsing
  let frame = 0;
  let deathFrame = 0;

  // Audio
  let audioCtx;
  function audio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    return audioCtx;
  }
  function beep(freq, dur, type='square', vol=0.08) {
    const ac = audio(); if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = vol;
    o.connect(g); g.connect(ac.destination);
    const now = ac.currentTime;
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);
    o.start(now); o.stop(now + dur);
  }
  function sfx(type){
    if(type==='dot') beep(880, 0.05, 'square', 0.04);
    else if(type==='power') { beep(440,0.1); setTimeout(()=>beep(660,0.1),80); setTimeout(()=>beep(880,0.15),160);}
    else if(type==='eatGhost'){ beep(300,0.08); setTimeout(()=>beep(500,0.08),60); setTimeout(()=>beep(800,0.12),120);}
    else if(type==='death'){
      const ac=audio(); if(!ac) return;
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sawtooth'; o.frequency.value=600;
      o.connect(g); g.connect(ac.destination);
      const now=ac.currentTime;
      g.gain.setValueAtTime(0.12, now);
      o.frequency.exponentialRampToValueAtTime(80, now+1.0);
      g.gain.exponentialRampToValueAtTime(0.001, now+1.0);
      o.start(now); o.stop(now+1.0);
    }
    else if(type==='win'){
      [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle',0.1), i*120));
    }
  }

  // Cell types
  const W=0, EMPTY=1, DOT=2, POWER=3, DOOR=4, TUNNEL=5;
  function parseMaze(){
    grid = [];
    pellets = [];
    dotsRemaining = 0;
    let pacSpawn = {x:13.5, y:23};
    for(let y=0;y<ROWS;y++){
      const row = [];
      for(let x=0;x<COLS;x++){
        const c = MAZE_TEMPLATE[y][x];
        if(c==='#') row.push(W);
        else if(c==='.') { row.push(DOT); dotsRemaining++; pellets.push({x,y,power:false}); }
        else if(c==='o') { row.push(POWER); dotsRemaining++; pellets.push({x,y,power:true}); }
        else if(c==='-') row.push(DOOR);
        else row.push(EMPTY);
      }
      grid.push(row);
    }
    // mark tunnel rows
    for(let y=0;y<ROWS;y++){
      if(grid[y][0]!==W && grid[y][COLS-1]!==W){
        // tunnel row
      }
    }
    return pacSpawn;
  }

  function isWall(x,y, allowDoor=false){
    if(y<0||y>=ROWS) return true;
    // horizontal wrap tunnel
    if(x<0||x>=COLS) return false;
    const c = grid[y][x];
    if(c===W) return true;
    if(c===DOOR && !allowDoor) return true;
    return false;
  }

  // Entities
  const DIRS = {
    up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0}, none:{x:0,y:0}
  };

  function makeEntity(tx, ty){
    return {
      x: tx*TILE + TILE/2,
      y: ty*TILE + TILE/2,
      dir: 'left',
      nextDir: 'none',
      speed: 1.4,
      // for tile-based movement decision
    };
  }

  function tileOf(e){
    return { x: Math.floor(e.x / TILE), y: Math.floor(e.y / TILE) };
  }
  function atCenter(e){
    const cx = Math.floor(e.x/TILE)*TILE + TILE/2;
    const cy = Math.floor(e.y/TILE)*TILE + TILE/2;
    return Math.abs(e.x - cx) < e.speed && Math.abs(e.y - cy) < e.speed;
  }
  function snapToCenter(e){
    e.x = Math.floor(e.x/TILE)*TILE + TILE/2;
    e.y = Math.floor(e.y/TILE)*TILE + TILE/2;
  }

  function canMove(e, dir){
    const d = DIRS[dir];
    if(d.x===0 && d.y===0) return false;
    const t = tileOf(e);
    const tx = t.x + d.x;
    const ty = t.y + d.y;
    return !isWall(tx, ty, e.isGhost && e.inHouse);
  }

  function moveEntity(e){
    // tunnel wrap
    if(e.x < -TILE/2) e.x = COLS*TILE + TILE/2 - 1;
    else if(e.x > COLS*TILE + TILE/2) e.x = -TILE/2 + 1;

    if(!atCenter(e)){
      // continue moving in current dir if possible
      const d = DIRS[e.dir];
      const nx = e.x + d.x * e.speed;
      const ny = e.y + d.y * e.speed;
      // check if we'd cross the center
      const cx = Math.floor(e.x/TILE)*TILE + TILE/2;
      const cy = Math.floor(e.y/TILE)*TILE + TILE/2;
      if((d.x !== 0 && ((e.x <= cx && nx >= cx) || (e.x >= cx && nx <= cx))) ||
         (d.y !== 0 && ((e.y <= cy && ny >= cy) || (e.y >= cy && ny <= cy)))){
        // we hit the center, decide direction
        snapToCenter(e);
        tryTurn(e);
      } else {
        e.x = nx; e.y = ny;
      }
    } else {
      tryTurn(e);
      const d = DIRS[e.dir];
      e.x += d.x * e.speed;
      e.y += d.y * e.speed;
    }
  }

  function tryTurn(e){
    // try nextDir
    if(e.nextDir && e.nextDir !== 'none' && canMove(e, e.nextDir)){
      e.dir = e.nextDir;
      e.nextDir = 'none';
      return;
    }
    // if current dir blocked, stop
    if(!canMove(e, e.dir)){
      e.dir = 'none';
    }
  }

  // Pac-Man
  function initPac(){
    const p = makeEntity(13.5, 23);
    p.dir = 'left';
    p.nextDir = 'none';
    p.speed = 1.6;
    p.mouthAngle = 0;
    return p;
  }

  // Ghosts
  const GHOST_DEFS = [
    {name:'blinky', color:'#ff2a2a', home:{x:13.5,y:11}, scatter:{x:25,y:-2}, start:{x:13.5,y:11}, startDir:'left', inHouse:false},
    {name:'pinky',  color:'#ff7edb', home:{x:13.5,y:14}, scatter:{x:2,y:-2},  start:{x:13.5,y:14}, startDir:'down', inHouse:true},
    {name:'inky',   color:'#43e0ff', home:{x:11.5,y:14}, scatter:{x:27,y:31}, start:{x:11.5,y:14}, startDir:'up', inHouse:true},
    {name:'clyde',  color:'#ffa64a', home:{x:15.5,y:14}, scatter:{x:0,y:31},  start:{x:15.5,y:14}, startDir:'up', inHouse:true}
  ];

  function initGhosts(){
    ghosts = GHOST_DEFS.map((g,i) => {
      const e = makeEntity(g.start.x, g.start.y);
      e.name = g.name;
      e.color = g.color;
      e.scatter = g.scatter;
      e.dir = g.startDir;
      e.isGhost = true;
      e.inHouse = g.inHouse;
      e.mode = 'scatter';
      e.exitTimer = [0, 2000, 4500, 7000][i]; // staggered exit
      e.speed = 1.4;
      e.eaten = false;
      return e;
    });
  }

  function ghostTarget(g){
    // returns tile target
    if(g.eaten) return {x:13.5, y:11}; // home
    if(g.mode === 'scatter') return g.scatter;
    if(g.mode === 'frightened') return null; // random
    // chase
    const pt = tileOf(pacman);
    if(g.name === 'blinky') return pt;
    if(g.name === 'pinky'){
      const d = DIRS[pacman.dir];
      return {x: pt.x + d.x*4, y: pt.y + d.y*4};
    }
    if(g.name === 'inky'){
      const blinky = ghosts[0];
      const bt = tileOf(blinky);
      const d = DIRS[pacman.dir];
      const ax = pt.x + d.x*2, ay = pt.y + d.y*2;
      return {x: ax*2 - bt.x, y: ay*2 - bt.y};
    }
    if(g.name === 'clyde'){
      const gt = tileOf(g);
      const dx = gt.x - pt.x, dy = gt.y - pt.y;
      const dist = Math.hypot(dx,dy);
      return dist > 8 ? pt : g.scatter;
    }
    return pt;
  }

  function reverseDir(dir){
    return {up:'down',down:'up',left:'right',right:'left'}[dir] || 'none';
  }

  function updateGhost(g){
    // exit house logic
    if(g.inHouse){
      g.exitTimer -= 16;
      // bob up/down
      if(g.exitTimer <= 0){
        // move toward door
        const doorX = 13.5*TILE + TILE/2;
        const doorY = 11*TILE + TILE/2;
        // first center x
        if(Math.abs(g.x - doorX) > 1){
          g.x += Math.sign(doorX - g.x) * 0.5;
        } else {
          g.x = doorX;
          if(g.y > doorY) g.y -= 0.8;
          if(g.y <= doorY + 1){
            g.y = doorY;
            g.inHouse = false;
            g.dir = 'left';
          }
        }
        return;
      } else {
        // bob
        g.y += Math.sin(frame * 0.1 + g.x) * 0.3;
        return;
      }
    }

    // eaten ghost returning home
    if(g.eaten){
      const homeX = 13.5*TILE + TILE/2;
      const homeY = 14*TILE + TILE/2;
      const dx = homeX - g.x, dy = homeY - g.y;
      if(Math.hypot(dx,dy) < 4){
        g.eaten = false;
        g.inHouse = true;
        g.exitTimer = 1500;
        g.mode = mode;
        g.speed = 1.4;
        return;
      }
      // move at higher speed toward home using greedy tile-based
      g.speed = 3.0;
      // allow door
      // simple greedy on tile center
      if(atCenter(g)){
        snapToCenter(g);
        const t = tileOf(g);
        const opts = ['up','down','left','right'].filter(d => {
          const dd = DIRS[d];
          return !isWall(t.x+dd.x, t.y+dd.y, true);
        });
        let best = null, bestDist = Infinity;
        for(const d of opts){
          const dd = DIRS[d];
          const nx = (t.x+dd.x)*TILE+TILE/2, ny=(t.y+dd.y)*TILE+TILE/2;
          const dist = Math.hypot(nx-homeX, ny-homeY);
          if(dist < bestDist){ bestDist = dist; best = d; }
        }
        if(best) g.dir = best;
      }
      const d = DIRS[g.dir];
      g.x += d.x * g.speed;
      g.y += d.y * g.speed;
      return;
    }

    // Normal movement
    if(atCenter(g)){
      snapToCenter(g);
      const t = tileOf(g);
      const opts = ['up','down','left','right'].filter(d => {
        if(d === reverseDir(g.dir)) return false; // no reverse (except mode change)
        const dd = DIRS[d];
        return !isWall(t.x+dd.x, t.y+dd.y, g.inHouse);
      });
      let choices = opts.length ? opts : [reverseDir(g.dir)];
      // if at tunnel row, allow horizontal
      if(g.mode === 'frightened'){
        g.dir = choices[Math.floor(Math.random()*choices.length)];
      } else {
        const target = ghostTarget(g);
        let best = choices[0], bestDist = Infinity;
        for(const d of choices){
          const dd = DIRS[d];
          const nx = t.x+dd.x, ny = t.y+dd.y;
          const dist = (nx-target.x)**2 + (ny-target.y)**2;
          if(dist < bestDist){ bestDist = dist; best = d; }
        }
        g.dir = best;
      }
    }
    g.speed = g.mode === 'frightened' ? 0.9 : (1.4 + Math.min(level*0.05, 0.6));
    const d = DIRS[g.dir];
    g.x += d.x * g.speed;
    g.y += d.y * g.speed;

    // tunnel wrap
    if(g.x < -TILE/2) g.x = COLS*TILE + TILE/2 - 1;
    else if(g.x > COLS*TILE + TILE/2) g.x = -TILE/2 + 1;
  }

  // Mode management
  function updateModes(dt){
    if(mode === 'frightened'){
      frightenedTimer -= dt;
      if(frightenedTimer <= 0){
        mode = modeSchedule[modeIndex][1];
        for(const g of ghosts){
          if(!g.eaten && !g.inHouse) g.mode = mode;
        }
      }
      return;
    }
    if(modeIndex < modeSchedule.length){
      modeTimer -= dt;
      if(modeTimer <= 0){
        modeIndex++;
        if(modeIndex < modeSchedule.length){
          mode = modeSchedule[modeIndex][0];
          modeTimer = modeSchedule[modeIndex][1];
          for(const g of ghosts){
            if(!g.eaten && !g.inHouse){
              g.mode = mode;
              g.dir = reverseDir(g.dir); // reverse on mode change
            }
          }
        }
      }
    }
  }

  function startFrightened(){
    mode = 'frightened';
    frightenedTimer = 6000 - Math.min(level*400, 3000);
    for(const g of ghosts){
      if(!g.eaten && !g.inHouse){
        g.mode = 'frightened';
        g.dir = reverseDir(g.dir);
      }
    }
  }

  // Collision
  function checkCollisions(){
    const pt = tileOf(pacman);
    // dots
    if(pt.x>=0 && pt.x<COLS && pt.y>=0 && pt.y<ROWS){
      const c = grid[pt.y][pt.x];
      if(c === DOT){
        grid[pt.y][pt.x] = EMPTY;
        dotsRemaining--;
        score += 10;
        sfx('dot');
        pellets = pellets.filter(p => !(p.x===pt.x && p.y===pt.y));
      } else if(c === POWER){
        grid[pt.y][pt.x] = EMPTY;
        dotsRemaining--;
        score += 50;
        sfx('power');
        startFrightened();
        pellets = pellets.filter(p => !(p.x===pt.x && p.y===pt.y));
      }
    }
    // ghosts
    for(const g of ghosts){
      if(g.inHouse) continue;
      const dx = g.x - pacman.x, dy = g.y - pacman.y;
      if(Math.hypot(dx,dy) < TILE*0.7){
        if(g.mode === 'frightened' && !g.eaten){
          g.eaten = true;
          score += 200;
          sfx('eatGhost');
        } else if(!g.eaten){
          // die
          if(state === 'playing'){
            state = 'dying';
            stateTimer = 1500;
            deathFrame = 0;
            sfx('death');
          }
        }
      }
    }
    // win
    if(dotsRemaining <= 0 && state === 'playing'){
      state = 'won';
      stateTimer = 2000;
      sfx('win');
    }
  }

  // Input
  const keys = {};
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) || ['w','a','s','d','p'].includes(k)){
      e.preventDefault();
    }
    if(state === 'ready' && (k==='enter'||k===' ')){ startGame(); return; }
    if(k === 'p'){
      if(state === 'playing') state = 'paused';
      else if(state === 'paused') state = 'playing';
      return;
    }
    if(state !== 'playing') return;
    if(k==='arrowup'||k==='w') pacman.nextDir = 'up';
    else if(k==='arrowdown'||k==='s') pacman.nextDir = 'down';
    else if(k==='arrowleft'||k==='a') pacman.nextDir = 'left';
    else if(k==='arrowright'||k==='d') pacman.nextDir = 'right';
  });

  // Rendering
  function drawMaze(){
    // walls
    ctx.lineWidth = 2;
    for(let y=0;y<ROWS;y++){
      for(let x=0;x<COLS;x++){
        const c = grid[y][x];
        const px = x*TILE, py = y*TILE;
        if(c === W){
          // draw rounded wall block based on neighbors
          ctx.fillStyle = '#0a0a30';
          ctx.fillRect(px, py, TILE, TILE);
          // determine edges
          const up = !isWall(x,y-1);
          const down = !isWall(x,y+1);
          const left = !isWall(x-1,y);
          const right = !isWall(x+1,y);
          // draw blue line on edges that face empty space
          ctx.strokeStyle = '#2a4dff';
          ctx.shadowColor = '#4f6bff';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          if(up){ ctx.moveTo(px,py+1); ctx.lineTo(px+TILE,py+1); }
          if(down){ ctx.moveTo(px,py+TILE-1); ctx.lineTo(px+TILE,py+TILE-1); }
          if(left){ ctx.moveTo(px+1,py); ctx.lineTo(px+1,py+TILE); }
          if(right){ ctx.moveTo(px+TILE-1,py); ctx.lineTo(px+TILE-1,py+TILE); }
          ctx.stroke();
          ctx.shadowBlur = 0;
        } else if(c === DOOR){
          ctx.fillStyle = '#ffb3c1';
          ctx.fillRect(px, py+TILE/2-1, TILE, 3);
        }
      }
    }
    // dots & pellets
    const pulse = 0.6 + 0.4*Math.sin(frame*0.15);
    for(const p of pellets){
      const cx = p.x*TILE + TILE/2;
      const cy = p.y*TILE + TILE/2;
      if(p.power){
        ctx.fillStyle = `rgba(255,207,58,${pulse})`;
        ctx.shadowColor = '#ffcf3a';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(cx, cy, 4.5, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
      } else {
        ctx.fillStyle = '#ffd9a8';
        ctx.fillRect(cx-1.5, cy-1.5, 3, 3);
      }
    }
  }

  function drawPacman(){
    if(state === 'dying'){
      // death animation
      const t = 1 - (stateTimer / 1500);
      const angle = Math.PI * t;
      ctx.save();
      ctx.translate(pacman.x, pacman.y);
      ctx.fillStyle = '#ffe44d';
      ctx.shadowColor = '#ffe44d';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.arc(0, 0, TILE*0.55, angle, Math.PI*2 - angle);
      ctx.lineTo(0,0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      return;
    }
    const mouthSpeed = 0.25;
    pacman.mouthAngle = Math.abs(Math.sin(frame * mouthSpeed)) * 0.35;
    let rot = 0;
    if(pacman.dir==='right') rot=0;
    else if(pacman.dir==='down') rot=Math.PI/2;
    else if(pacman.dir==='left') rot=Math.PI;
    else if(pacman.dir==='up') rot=-Math.PI/2;
    ctx.save();
    ctx.translate(pacman.x, pacman.y);
    ctx.rotate(rot);
    ctx.fillStyle = '#ffe44d';
    ctx.shadowColor = '#ffe44d';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.arc(0, 0, TILE*0.55, pacman.mouthAngle, Math.PI*2 - pacman.mouthAngle);
    ctx.lineTo(0,0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  function drawGhost(g){
    const x = g.x, y = g.y;
    const r = TILE*0.55;
    let color = g.color;
    if(g.eaten){
      // only eyes
      drawEyes(x,y,g.dir);
      return;
    }
    if(g.mode === 'frightened'){
      const flash = frightenedTimer < 2000 && Math.floor(frame/8)%2===0;
      color = flash ? '#ffffff' : '#2a3aff';
    }
    ctx.save();
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(x, y-1, r, Math.PI, 0);
    ctx.lineTo(x+r, y+r-2);
    // wavy bottom
    const waves = 3;
    const step = (2*r)/waves;
    for(let i=0;i<waves;i++){
      const x1 = x+r - i*step;
      const x2 = x+r - (i+0.5)*step;
      const x3 = x+r - (i+1)*step;
      ctx.lineTo(x2, y+r-5);
      ctx.lineTo(x3, y+r-2);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();

    if(g.mode === 'frightened'){
      // scared face
      ctx.fillStyle = '#fff';
      ctx.fillRect(x-4, y-2, 2, 2);
      ctx.fillRect(x+2, y-2, 2, 2);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x-5, y+5); ctx.lineTo(x-3, y+3); ctx.lineTo(x-1, y+5);
      ctx.lineTo(x+1, y+3); ctx.lineTo(x+3, y+5); ctx.lineTo(x+5, y+3);
      ctx.stroke();
    } else {
      drawEyes(x,y,g.dir);
    }
  }

  function drawEyes(x,y,dir){
    const d = DIRS[dir];
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x-3.5, y-2, 2.5, 3.2, 0, 0, Math.PI*2);
    ctx.ellipse(x+3.5, y-2, 2.5, 3.2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#1030ff';
    ctx.beginPath();
    ctx.arc(x-3.5 + d.x*1.5, y-2 + d.y*1.5, 1.6, 0, Math.PI*2);
    ctx.arc(x+3.5 + d.x*1.5, y-2 + d.y*1.5, 1.6, 0, Math.PI*2);
    ctx.fill();
  }

  function render(){
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    drawMaze();
    if(state !== 'dying' || deathFrame < 30){
      drawPacman();
    }
    for(const g of ghosts){
      if(state !== 'ready') drawGhost(g);
    }
    // pause overlay
    if(state === 'paused'){
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#ffe44d';
      ctx.font = '28px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('PAUSED', canvas.width/2, canvas.height/2);
    }
    if(state === 'won'){
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#ffe44d';
      ctx.font = '24px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL CLEAR', canvas.width/2, canvas.height/2);
    }
  }

  function updateHUD(){
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    const livesEl = document.getElementById('lives');
    livesEl.innerHTML = '';
    for(let i=0;i<lives;i++){
      const d = document.createElement('div');
      d.className = 'life';
      livesEl.appendChild(d);
    }
  }

  // Game loop
  let lastTime = 0;
  function loop(t){
    const dt = Math.min(t - lastTime, 50);
    lastTime = t;
    frame++;

    if(state === 'playing'){
      updateModes(dt);
      moveEntity(pacman);
      for(const g of ghosts) updateGhost(g);
      checkCollisions();
    } else if(state === 'dying'){
      stateTimer -= dt;
      deathFrame++;
      if(stateTimer <= 0){
        lives--;
        if(lives <= 0){
          state = 'gameover';
          showOverlay('GAME OVER', `Final score: ${score}`, 'PLAY AGAIN');
        } else {
          resetPositions();
          state = 'ready';
          stateTimer = 1200;
        }
      }
    } else if(state === 'ready'){
      if(stateTimer > 0){
        stateTimer -= dt;
        if(stateTimer <= 0){
          state = 'playing';
        }
      }
    } else if(state === 'won'){
      stateTimer -= dt;
      if(stateTimer <= 0){
        level++;
        newLevel();
      }
    }

    render();
    updateHUD();
    requestAnimationFrame(loop);
  }

  function resetPositions(){
    pacman = initPac();
    initGhosts();
    modeIndex = 0;
    mode = modeSchedule[0][0];
    modeTimer = modeSchedule[0][1];
  }

  function newLevel(){
    parseMaze();
    resetPositions();
    state = 'ready';
    stateTimer = 1500;
  }

  function startGame(){
    score = 0;
    level = 1;
    lives = 3;
    newLevel();
    document.getElementById('overlay').classList.add('hidden');
    state = 'ready';
    stateTimer = 1500;
    audio(); // unlock audio context
  }

  function showOverlay(title, msg, btnText){
    const o = document.getElementById('overlay');
    o.querySelector('h2').textContent = title;
    o.querySelector('p').innerHTML = msg;
    o.querySelector('.btn').textContent = btnText;
    o.classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('click', startGame);

  // Initial parse for first render
  parseMaze();
  resetPositions();
  state = 'ready';
  stateTimer = 0;
  updateHUD();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
