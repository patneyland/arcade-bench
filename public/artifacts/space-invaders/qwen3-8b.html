<!DOCTYPE html>
<html>
<head>
    <title>Space Invaders</title>
    <style>
        body {
            text-align: center;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }
        canvas {
            background-color: black;
            display: block;
            margin: 0 auto;
        }
        h1 {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Space Invaders</h1>
    <canvas id="gameCanvas" width="480" height="640"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 50,
            width: 50,
            height: 20,
            speed: 5
        };

        let bullets = [];
        let alienBullets = [];
        let aliens = [];
        let alienDirection = 1;
        let alienSpeed = 1;
        let alienShootTimer = 0;
        let score = 0;
        let gameOver = false;

        const alienRows = 5;
        const alienCols = 10;

        // Initialize aliens
        for (let row = 0; row < alienRows; row++) {
            for (let col = 0; col < alienCols; col++) {
                aliens.push({
                    x: 50 + col * 60,
                    y: 50 + row * 40,
                    width: 40,
                    height: 40,
                    alive: true
                });
            }
        }

        // Keyboard input
        let keys = {};
        document.addEventListener('keydown', function(e) {
            keys[e.key] = true;
        });
        document.addEventListener('keyup', function(e) {
            keys[e.key] = false;
        });

        function gameLoop() {
            if (gameOver) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            // Player movement
            if (keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }

            // Shooting
            if (keys[' '] && !gameOver) {
                bullets.push({
                    x: player.x + player.width / 2 - 2,
                    y: player.y,
                    width: 4,
                    height: 10,
                    speed: 5
                });
            }

            // Update bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                let bullet = bullets[i];
                bullet.y -= bullet.speed;
                if (bullet.y < 0) {
                    bullets.splice(i, 1);
                    continue;
                }
                // Check collision with aliens
                for (let j = aliens.length - 1; j >= 0; j--) {
                    let alien = aliens[j];
                    if (!alien.alive) continue;
                    if (bullet.x < alien.x + alien.width &&
                        bullet.x + bullet.width > alien.x &&
                        bullet.y < alien.y + alien.height &&
                        bullet.y + bullet.height > alien.y) {
                        alien.alive = false;
                        bullets.splice(i, 1);
                        score += 10;
                        break;
                    }
                }
            }

            // Update alien bullets
            for (let i = alienBullets.length - 1; i >= 0; i--) {
                let bullet = alienBullets[i];
                bullet.y += bullet.speed;
                if (bullet.y > canvas.height) {
                    alienBullets.splice(i, 1);
                    continue;
                }
                // Check collision with player
                if (bullet.x < player.x + player.width &&
                    bullet.x + bullet.width > player.x &&
                    bullet.y < player.y + player.height &&
                    bullet.y + bullet.height > player.y) {
                    gameOver = true;
                    return;
                }
            }

            // Update aliens
            let alienMove = true;
            for (let alien of aliens) {
                if (!alien.alive) continue;
                alien.x += alienDirection * alienSpeed;
            }

            // Check if aliens hit the edge
            for (let alien of aliens) {
                if (!alien.alive) continue;
                if (alien.x <= 0 || alien.x + alien.width >= canvas.width) {
                    alienMove = false;
                    break;
                }
            }

            if (!alienMove) {
                alienDirection *= -1;
                for (let alien of aliens) {
                    if (alien.alive) {
                        alien.y += 20;
                    }
                }
            }

            // Alien shooting
            alienShootTimer++;
            if (alienShootTimer > 100) {
                let randomAlien = Math.floor(Math.random() * aliens.length);
                let alien = aliens[randomAlien];
                if (alien.alive) {
                    alienBullets.push({
                        x: alien.x + alien.width / 2 - 2,
                        y: alien.y,
                        width: 4,
                        height: 10,
                        speed: 3
                    });
                    alienShootTimer = 0;
                }
            }

            // Check if any alien reached the bottom
            for (let alien of aliens) {
                if (alien.alive && alien.y + alien.height >= canvas.height) {
                    gameOver = true;
                    return;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameOver) {
                ctx.fillStyle = 'white';
                ctx.font = '40px Arial';
                ctx.fillText('Game Over', canvas.width / 2 - 100, canvas.height / 2);
                return;
            }

            // Draw player
            ctx.fillStyle = 'white';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Draw bullets
            for (let bullet of bullets) {
                ctx.fillStyle = 'yellow';
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            }

            // Draw alien bullets
            for (let bullet of alienBullets) {
                ctx.fillStyle = 'red';
                ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
            }

            // Draw aliens
            for (let alien of aliens) {
                if (alien.alive) {
                    ctx.fillStyle = 'green';
                    ctx.fillRect(alien.x, alien.y, alien.width, alien.height);
                }
            }

            // Draw score
            ctx.fillStyle = 'white';
            ctx.font = '20px Arial';
            ctx.fillText('Score: ' + score, 10, 30);
        }

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
