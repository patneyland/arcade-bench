<!DOCTYPE html>
<html>
<head>
<title>Pong</title>
<style>
  body { margin: 0; overflow: hidden; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { border: 1px solid #fff; }
</style>
</head>
<body>
<canvas id="pongCanvas"></canvas>

<script>
  const canvas = document.getElementById('pongCanvas');
  const context = canvas.getContext('2d');

  // Set canvas dimensions to fill the viewport
  canvas.width = window.innerWidth * 0.8;
  canvas.height = window.innerHeight * 0.8;

  // Game settings
  const PADDLE_WIDTH = 15;
  const PADDLE_HEIGHT = 100;
  const BALL_SIZE = 15;
  const WINNING_SCORE = 10;

  // Game objects
  let player1 = {
    x: 10,
    y: canvas.height / 2 - PADDLE_HEIGHT / 2,
    width: PADDLE_WIDTH,
    height: PADDLE_HEIGHT,
    color: '#fff',
    score: 0
  };

  let player2 = {
    x: canvas.width - PADDLE_WIDTH - 10,
    y: canvas.height / 2 - PADDLE_HEIGHT / 2,
    width: PADDLE_WIDTH,
    height: PADDLE_HEIGHT,
    color: '#fff',
    score: 0
  };

  let ball = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    size: BALL_SIZE,
    color: '#fff',
    velocityX: 5,
    velocityY: 5
  };

  // Control variables
  let player1Up = false;
  let player1Down = false;
  let player2Up = false;
  let player2Down = false;

  // Event listeners for controls
  document.addEventListener('keydown', (event) => {
    switch (event.key) {
      case 'w':
      case 'W':
        player1Up = true;
        break;
      case 's':
      case 'S':
        player1Down = true;
        break;
      case 'ArrowUp':
        player2Up = true;
        break;
      case 'ArrowDown':
        player2Down = true;
        break;
    }
  });

  document.addEventListener('keyup', (event) => {
    switch (event.key) {
      case 'w':
      case 'W':
        player1Up = false;
        break;
      case 's':
      case 'S':
        player1Down = false;
        break;
      case 'ArrowUp':
        player2Up = false;
        break;
      case 'ArrowDown':
        player2Down = false;
        break;
    }
  });

  // Drawing functions
  function drawRect(x, y, w, h, color) {
    context.fillStyle = color;
    context.fillRect(x, y, w, h);
  }

  function drawCircle(x, y, r, color) {
    context.fillStyle = color;
    context.beginPath();
    context.arc(x, y, r, 0, Math.PI * 2, false);
    context.closePath();
    context.fill();
  }

  function drawText(text, x, y, color, fontSize) {
    context.fillStyle = color;
    context.font = `${fontSize}px Arial`;
    context.textAlign = 'center';
    context.fillText(text, x, y);
  }

  function drawNet() {
    for (let i = 0; i <= canvas.height; i += 20) {
      drawRect(canvas.width / 2 - 1, i, 2, 10, '#fff');
    }
  }

  // Game logic update
  function update() {
    // Move paddles
    if (player1Up && player1.y > 0) {
      player1.y -= 7;
    }
    if (player1Down && player1.y < canvas.height - player1.height) {
      player1.y += 7;
    }
    if (player2Up && player2.y > 0) {
      player2.y -= 7;
    }
    if (player2Down && player2.y < canvas.height - player2.height) {
      player2.y += 7;
    }

    // Move ball
    ball.x += ball.velocityX;
    ball.y += ball.velocityY;

    // Ball collision with top/bottom walls
    if (ball.y - ball.size < 0 || ball.y + ball.size > canvas.height) {
      ball.velocityY *= -1;
    }

    // Ball collision with paddles
    let paddle = (ball.x < canvas.width / 2) ? player1 : player2;

    if (collides(ball, paddle)) {
      // Where the ball hits the paddle
      let collidePoint = ball.y - (paddle.y + paddle.height / 2);
      // Normalize the collide point to be -1 to 1
      collidePoint = collidePoint / (paddle.height / 2);

      // Calculate angle of the bounce
      let angleRad = collidePoint * Math.PI / 4; // Max angle is 45 degrees

      // Change velocity of the ball
      let direction = (ball.x < canvas.width / 2) ? 1 : -1;
      ball.velocityX = direction * Math.abs(ball.velocityX) * Math.cos(angleRad); // Keep horizontal speed, adjust with angle
      ball.velocityY = Math.abs(ball.velocityX) * Math.sin(angleRad);            // Vertical speed based on angle

      // Increase ball speed slightly with each paddle hit
      ball.velocityX *= 1.05;
      ball.velocityY *= 1.05;
    }

    // Score handling
    if (ball.x - ball.size < 0) {
      player2.score++;
      resetBall();
    } else if (ball.x + ball.size > canvas.width) {
      player1.score++;
      resetBall();
    }
  }

  // Collision detection
  function collides(ball, paddle) {
    paddle.top = paddle.y;
    paddle.bottom = paddle.y + paddle.height;
    paddle.left = paddle.x;
    paddle.right = paddle.x + paddle.width;

    ball.top = ball.y - ball.size;
    ball.bottom = ball.y + ball.size;
    ball.left = ball.x - ball.size;
    ball.right = ball.x + ball.size;

    return ball.left < paddle.right && ball.right > paddle.left && ball.top < paddle.bottom && ball.bottom > paddle.top;
  }

  // Reset ball to center and give it a new random direction
  function resetBall() {
    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
    ball.velocityX = (Math.random() < 0.5) ? 5 : -5;
    ball.velocityY = (Math.random() < 0.5) ? 5 : -5;
    ball.velocityX *= 1.05; // Ensure ball starts faster
    ball.velocityY *= 1.05;
  }

  // Render the game
  function render() {
    // Clear the canvas
    drawRect(0, 0, canvas.width, canvas.height, '#000');

    // Draw the net
    drawNet();

    // Draw scores
    drawText(player1.score, canvas.width / 4, canvas.height / 10, '#fff', 80);
    drawText(player2.score, 3 * canvas.width / 4, canvas.height / 10, '#fff', 80);

    // Draw paddles
    drawRect(player1.x, player1.y, player1.width, player1.height, player1.color);
    drawRect(player2.x, player2.y, player2.width, player2.height, player2.color);

    // Draw ball
    drawCircle(ball.x, ball.y, ball.size, ball.color);
  }

  // Game loop
  function gameLoop() {
    update();
    render();

    // Check for win condition
    if (player1.score >= WINNING_SCORE || player2.score >= WINNING_SCORE) {
      let winner = player1.score >= WINNING_SCORE ? "Player 1" : "Player 2";
      drawText(`${winner} Wins!`, canvas.width / 2, canvas.height / 2, '#fff', 100);
      // Optionally, you could add a button to restart
      return; // Stop the game loop
    }

    requestAnimationFrame(gameLoop);
  }

  // Adjust canvas size on window resize
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth * 0.8;
    canvas.height = window.innerHeight * 0.8;

    // Reset object positions and dimensions based on new canvas size
    player1.y = canvas.height / 2 - player1.height / 2;
    player2.x = canvas.width - player1.width - 10;
    player2.y = canvas.height / 2 - player1.height / 2;

    ball.x = canvas.width / 2;
    ball.y = canvas.height / 2;
  });


  // Start the game
  resetBall(); // Initialize ball position and velocity
  gameLoop();
</script>
</body>
</html>
