<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1e1e2f, #2d2d44);
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: #fff;
        user-select: none;
    }

    h1 {
        margin-bottom: 10px;
        font-size: 2.5rem;
        text-shadow: 0 0 10px rgba(0, 255, 128, 0.6);
        letter-spacing: 2px;
    }

    .scoreboard {
        display: flex;
        gap: 40px;
        margin-bottom: 15px;
        font-size: 1.2rem;
    }

    .scoreboard span {
        color: #4ade80;
        font-weight: bold;
    }

    .game-container {
        position: relative;
    }

    canvas {
        background: #0f0f1a;
        border: 3px solid #4ade80;
        border-radius: 8px;
        box-shadow: 0 0 30px rgba(74, 222, 128, 0.4);
    }

    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(15, 15, 26, 0.9);
        border-radius: 8px;
        text-align: center;
    }

    .overlay h2 {
        font-size: 2rem;
        margin-bottom: 15px;
    }

    .overlay p {
        margin-bottom: 20px;
        font-size: 1rem;
        color: #aaa;
    }

    button {
        padding: 12px 30px;
        font-size: 1.1rem;
        background: #4ade80;
        color: #0f0f1a;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.1s, box-shadow 0.2s;
    }

    button:hover {
        transform: scale(1.05);
        box-shadow: 0 0 15px rgba(74, 222, 128, 0.6);
    }

    .hidden {
        display: none;
    }

    .controls {
        margin-top: 15px;
        font-size: 0.85rem;
        color: #888;
    }
</style>
</head>
<body>
    <h1>🐍 SNAKE</h1>
    <div class="scoreboard">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
    </div>
    <div class="game-container">
        <canvas id="game" width="400" height="400"></canvas>
        <div class="overlay" id="overlay">
            <h2 id="overlayTitle">Snake Game</h2>
            <p id="overlayText">Use arrow keys or WASD to move</p>
            <button id="startBtn">Start Game</button>
        </div>
    </div>
    <div class="controls">Arrow Keys / WASD to move &nbsp;•&nbsp; Space to pause</div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const startBtn = document.getElementById('startBtn');

    const GRID = 20;
    const CELLS = canvas.width / GRID; // 20 cells

    let snake, direction, nextDirection, food, score, best, gameLoop, speed, running, paused;

    best = parseInt(localStorage.getItem('snakeBest')) || 0;
    bestEl.textContent = best;

    function init() {
        snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        score = 0;
        speed = 120;
        scoreEl.textContent = score;
        placeFood();
        paused = false;
    }

    function placeFood() {
        let valid = false;
        while (!valid) {
            food = {
                x: Math.floor(Math.random() * CELLS),
                y: Math.floor(Math.random() * CELLS)
            };
            valid = !snake.some(s => s.x === food.x && s.y === food.y);
        }
    }

    function startGame() {
        init();
        overlay.classList.add('hidden');
        running = true;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
    }

    function tick() {
        if (paused) return;
        update();
        draw();
    }

    function update() {
        direction = nextDirection;
        const head = {
            x: snake[0].x + direction.x,
            y: snake[0].y + direction.y
        };

        // wall collision
        if (head.x < 0 || head.x >= CELLS || head.y < 0 || head.y >= CELLS) {
            return gameOver();
        }

        // self collision
        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            return gameOver();
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreEl.textContent = score;
            placeFood();
            // speed up gradually
            if (speed > 60) {
                speed -= 3;
                clearInterval(gameLoop);
                gameLoop = setInterval(tick, speed);
            }
        } else {
            snake.pop();
        }
    }

    function draw() {
        // background
        ctx.fillStyle = '#0f0f1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // subtle grid
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        for (let i = 0; i <= CELLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * GRID, 0);
            ctx.lineTo(i * GRID, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * GRID);
            ctx.lineTo(canvas.width, i * GRID);
            ctx.stroke();
        }

        // food
        ctx.fillStyle = '#ff5555';
        ctx.shadowColor = '#ff5555';
        ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.arc(food.x * GRID + GRID / 2, food.y * GRID + GRID / 2, GRID / 2 - 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // snake
        snake.forEach((seg, i) => {
            const isHead = i === 0;
            ctx.fillStyle = isHead ? '#86efac' : '#4ade80';
            const px = seg.x * GRID;
            const py = seg.y * GRID;
            roundRect(px + 1, py + 1, GRID - 2, GRID - 2, 5);
            ctx.fill();

            // eyes on head
            if (isHead) {
                ctx.fillStyle = '#0f0f1a';
                const ex = px + GRID / 2, ey = py + GRID / 2;
                const off = 4;
                ctx.beginPath();
                ctx.arc(ex - off * direction.y + direction.x * 3 - (direction.x ? 0 : off), 
                        ey - off * direction.x + direction.y * 3 - (direction.y ? 0 : off), 2, 0, Math.PI * 2);
                ctx.arc(ex + off * direction.y + direction.x * 3 + (direction.x ? 0 : off), 
                        ey + off * direction.x + direction.y * 3 + (direction.y ? 0 : off), 2, 0, Math.PI * 2);
                ctx.fill();
            }
        });
    }

    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
    }

    function gameOver() {
        running = false;
        clearInterval(gameLoop);
        if (score > best) {
            best = score;
            localStorage.setItem('snakeBest', best);
            bestEl.textContent = best;
        }
        overlayTitle.textContent = 'Game Over!';
        overlayText.textContent = `You scored ${score} points`;
        startBtn.textContent = 'Play Again';
        overlay.classList.remove('hidden');
    }

    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();

        if (key === ' ') {
            if (running) {
                paused = !paused;
                e.preventDefault();
            }
            return;
        }

        let newDir = null;
        if (key === 'arrowup' || key === 'w') newDir = { x: 0, y: -1 };
        else if (key === 'arrowdown' || key === 's') newDir = { x: 0, y: 1 };
        else if (key === 'arrowleft' || key === 'a') newDir = { x: -1, y: 0 };
        else if (key === 'arrowright' || key === 'd') newDir = { x: 1, y: 0 };

        if (newDir) {
            e.preventDefault();
            // prevent reversing
            if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
                nextDirection = newDir;
            }
        }
    });

    startBtn.addEventListener('click', startGame);

    // initial draw
    init();
    draw();
    overlay.classList.remove('hidden');
</script>
</body>
</html>
