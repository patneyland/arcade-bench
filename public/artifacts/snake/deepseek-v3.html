<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  body{margin:0;background:#0a0a12;color:#ddd;font-family:Arial,sans-serif;
    display:flex;flex-direction:column;align-items:center;padding-top:24px;}
  canvas{background:#0B0B12;border:2px solid #1B1A22;}
  #score{font-family:monospace;font-size:16px;margin:10px 0;}
  #help{font-size:13px;color:#888;}
  h3{font-family:monospace;letter-spacing:.2em;color:#18B26B;}
</style>
</head>
<body>
  <h3>SNAKE</h3>
  <div id="score">Score: 0</div>
  <canvas id="game" width="440" height="440"></canvas>
  <div id="help">Arrow keys to move &middot; Space to restart after game over</div>
<script>
var canvas = document.getElementById('game');
var ctx = canvas.getContext('2d');
var box = 22;
var cols = canvas.width / box;
var rows = canvas.height / box;

var snake, dir, food, score, dead, timer;

function init(){
  snake = [{x:5,y:10},{x:4,y:10},{x:3,y:10}];
  dir = {x:1,y:0};
  score = 0;
  dead = false;
  spawnFood();
  document.getElementById('score').textContent = 'Score: 0';
}

function spawnFood(){
  food = { x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows) };
}

document.addEventListener('keydown', function(e){
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) >= 0) e.preventDefault();
  if(e.key === 'ArrowUp' && dir.y === 0) dir = {x:0,y:-1};
  else if(e.key === 'ArrowDown' && dir.y === 0) dir = {x:0,y:1};
  else if(e.key === 'ArrowLeft' && dir.x === 0) dir = {x:-1,y:0};
  else if(e.key === 'ArrowRight' && dir.x === 0) dir = {x:1,y:0};
  else if(e.key === ' ' && dead) init();
});

function update(){
  if(dead) return;
  var head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if(head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows){ dead = true; return; }
  for(var i=0;i<snake.length;i++){
    if(snake[i].x === head.x && snake[i].y === head.y){ dead = true; return; }
  }

  snake.unshift(head);
  if(head.x === food.x && head.y === food.y){
    score++;
    document.getElementById('score').textContent = 'Score: ' + score;
    spawnFood();
  } else {
    snake.pop();
  }
}

function draw(){
  ctx.fillStyle = '#0B0B12';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#FF4D4D';
  ctx.fillRect(food.x*box+2, food.y*box+2, box-4, box-4);

  ctx.fillStyle = '#18B26B';
  for(var i=0;i<snake.length;i++){
    ctx.fillRect(snake[i].x*box+1, snake[i].y*box+1, box-2, box-2);
  }

  if(dead){
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '26px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Game Over - Score ' + score, canvas.width/2, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
}

init();
setInterval(loop, 120);
</script>
</body>
</html>
