<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        body {
            background-color: #2c3e50;
            color: #ecf0f1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: bold;
        }

        canvas {
            background-color: #1a252f;
            border: 2px solid #7f8c8d;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            display: none;
            z-index: 10;
        }

        #overlay h1 {
            margin: 0 0 10px 0;
            color: #e74c3c;
            font-size: 48px;
        }

        #overlay p {
            margin: 0;
            font-size: 18px;
            color: #bdc3c7;
            text-align: center;
        }

        #overlay span {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #27ae60;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #overlay span:hover {
            background-color: #2ecc71;
        }

        .controls-hint {
            margin-top: 20px;
            color: #95a5a6;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="header">
            <div>Score: <span id="score">0</span></div>
            <div>Hi-Score: <span id="high-score">0</span></div>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div id="overlay">
            <h1>Game Over!</h1>
            <p>You hit the wall or yourself.</p>
            <span onclick="resetGame()">Play Again (Space)</span>
        </div>
    </div>
    
    <div class="controls-hint">
        Use <strong>Arrow Keys</strong> or <strong>W A S D</strong> to move.<br>
        Press <strong>Space</strong> to quickly restart after game over.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const highScoreElement = document.getElementById("high-score");
        const overlay = document.getElementById("overlay");

        // Game Configuration
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        const gameSpeed = 100; // Milliseconds per frame (lower is faster)

        // Game Variables
        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0; // Velocity X
        let dy = 0; // Velocity Y
        let score = 0;
        let highScore = localStorage.getItem("snakeHighScore") || 0;
        let gameLoopTimeout;
        let isGameOver = false;
        let changingDirection = false; // Prevents 180-degree quick turn bug

        highScoreElement.textContent = highScore;

        // Initialize Game State
        function initGame() {
            // Start snake in the middle, 3 segments long
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            
            // Start moving right
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            overlay.style.display = "none";
            
            spawnFood();
            gameLoop();
        }

        // Main Game Loop
        function gameLoop() {
            if (isGameOver) return;

            changingDirection = false;
            gameLoopTimeout = setTimeout(() => {
                clearCanvas();
                drawFood();
                moveSnake();
                drawSnake();
                checkCollisions();
                
                if (!isGameOver) {
                    gameLoop();
                }
            }, gameSpeed);
        }

        function clearCanvas() {
            ctx.fillStyle = "#1a252f";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function moveSnake() {
            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            // Add new head to beginning of array
            snake.unshift(head);

            // Check if snake ate food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem("snakeHighScore", highScore);
                }
                spawnFood();
            } else {
                // If didn't eat food, remove the tail
                snake.pop();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is a different color than the body
                ctx.fillStyle = index === 0 ? "#2ecc71" : "#27ae60";
                ctx.strokeStyle = "#1a252f";
                
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
                ctx.strokeRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
            });
        }

        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath();
            // Draw food as a circle
            const centerX = food.x * gridSize + gridSize / 2;
            const centerY = food.y * gridSize + gridSize / 2;
            const radius = gridSize / 2 - 2;
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // Ensure food doesn't spawn on top of the snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                }
            });
        }

        function checkCollisions() {
            const head = snake[0];

            // Wall Collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
            }

            // Self Collision (start checking from index 1, skipping head)
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                }
            }
        }

        function gameOver() {
            isGameOver = true;
            clearTimeout(gameLoopTimeout);
            overlay.style.display = "flex";
        }

        function resetGame() {
            clearTimeout(gameLoopTimeout);
            initGame();
        }

        // Keyboard Controls
        document.addEventListener("keydown", (event) => {
            // Prevent default scrolling behavior for game keys
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(event.code)) {
                event.preventDefault();
            }

            if (isGameOver && event.code === "Space") {
                resetGame();
                return;
            }

            if (changingDirection) return;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            switch (event.key) {
                case "ArrowUp":
                case "w":
                case "W":
                    if (!goingDown) { dx = 0; dy = -1; changingDirection = true; }
                    break;
                case "ArrowDown":
                case "s":
                case "S":
                    if (!goingUp) { dx = 0; dy = 1; changingDirection = true; }
                    break;
                case "ArrowLeft":
                case "a":
                case "A":
                    if (!goingRight) { dx = -1; dy = 0; changingDirection = true; }
                    break;
                case "ArrowRight":
                case "d":
                case "D":
                    if (!goingLeft) { dx = 1; dy = 0; changingDirection = true; }
                    break;
            }
        });

        // Start the game for the first time
        initGame();
    </script>
</body>
</html>
