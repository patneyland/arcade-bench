<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  html,body{margin:0;height:100%;background:#07070d;color:#e8e8f0;
    font-family:system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  h1{font-size:14px;letter-spacing:.3em;margin:0;color:#18B26B;text-transform:uppercase;}
  canvas{background:#0B0B12;border:2px solid #1B1A22;border-radius:6px;
    image-rendering:pixelated;box-shadow:4px 4px 0 #000;}
  #hud{display:flex;gap:24px;font-family:"Courier New",monospace;font-size:15px;color:#cfcde0;}
  #hud b{color:#FFC700;}
  #controls{font-size:13px;color:#9a98ab;}
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="hud"><span>Score <b id="score">0</b></span><span>Best <b id="best">0</b></span></div>
  <canvas id="c" width="480" height="480"></canvas>
  <div id="controls">Arrow keys to move &middot; eat food, avoid walls &amp; yourself &middot; Space to restart</div>
<script>
(function(){
  const cv = document.getElementById('c');
  const ctx = cv.getContext('2d');
  const GRID = 24;           // 20x20 cells
  const COLS = cv.width / GRID;
  const ROWS = cv.height / GRID;
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best');

  let snake, dir, nextDir, food, score, best = 0, state, growthQueue;
  const STEP_MS = 110;
  let acc = 0, last = 0;

  function reset(){
    snake = [{x:9,y:10},{x:8,y:10},{x:7,y:10}];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    growthQueue = 0;
    state = 'play';
    placeFood();
    scoreEl.textContent = '0';
  }

  function placeFood(){
    let ok = false;
    while(!ok){
      food = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
      ok = !snake.some(s => s.x===food.x && s.y===food.y);
    }
  }

  window.addEventListener('keydown', e=>{
    const k = e.key;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(k)) e.preventDefault();
    if(state === 'over' && k === ' '){ reset(); return; }
    // prevent reversing directly into the neck
    if(k === 'ArrowUp'    && dir.y === 0) nextDir = {x:0,y:-1};
    if(k === 'ArrowDown'  && dir.y === 0) nextDir = {x:0,y:1};
    if(k === 'ArrowLeft'  && dir.x === 0) nextDir = {x:-1,y:0};
    if(k === 'ArrowRight' && dir.x === 0) nextDir = {x:1,y:0};
  });

  function step(){
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // wall collision
    if(head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS){ gameOver(); return; }
    // self collision (ignore tail tip which moves away, unless growing)
    const checkLen = growthQueue > 0 ? snake.length : snake.length - 1;
    for(let i=0;i<checkLen;i++){
      if(snake[i].x === head.x && snake[i].y === head.y){ gameOver(); return; }
    }

    snake.unshift(head);

    if(head.x === food.x && head.y === food.y){
      score += 10;
      scoreEl.textContent = score;
      growthQueue += 1;
      placeFood();
    }

    if(growthQueue > 0){ growthQueue--; }
    else { snake.pop(); }
  }

  function gameOver(){
    state = 'over';
    if(score > best){ best = score; bestEl.textContent = best; }
  }

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    // subtle grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    for(let i=1;i<COLS;i++){ ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,cv.height); ctx.stroke(); }
    for(let j=1;j<ROWS;j++){ ctx.beginPath(); ctx.moveTo(0,j*GRID); ctx.lineTo(cv.width,j*GRID); ctx.stroke(); }

    // food
    ctx.fillStyle = '#FF4D4D';
    ctx.fillRect(food.x*GRID+3, food.y*GRID+3, GRID-6, GRID-6);

    // snake
    for(let i=0;i<snake.length;i++){
      const s = snake[i];
      ctx.fillStyle = i===0 ? '#18B26B' : '#13965a';
      ctx.fillRect(s.x*GRID+1, s.y*GRID+1, GRID-2, GRID-2);
    }

    if(state === 'over'){
      ctx.fillStyle = 'rgba(7,7,13,0.78)';
      ctx.fillRect(0,0,cv.width,cv.height);
      ctx.fillStyle = '#FF4D4D';
      ctx.font = '30px system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', cv.width/2, cv.height/2 - 14);
      ctx.fillStyle = '#cfcde0';
      ctx.font = '15px system-ui,sans-serif';
      ctx.fillText('Score ' + score + ' · Press Space to restart', cv.width/2, cv.height/2 + 18);
    }
  }

  function loop(ts){
    if(!last) last = ts;
    const dt = ts - last; last = ts;
    if(state === 'play'){
      acc += dt;
      while(acc >= STEP_MS){ acc -= STEP_MS; step(); if(state!=='play') break; }
    }
    draw();
    requestAnimationFrame(loop);
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
