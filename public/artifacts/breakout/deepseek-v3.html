<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
            color: white;
        }
        #game-container {
            position: relative;
        }
        canvas {
            background-color: #111;
            border: 2px solid #444;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.7);
        }
        #game-over-screen {
            display: none;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            margin-bottom: 20px;
        }
        #score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
        }
        #lives-display {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="400"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="lives-display">Lives: 3</div>
        
        <div id="start-screen">
            <h1>BREAKOUT</h1>
            <p>Use arrow keys or mouse to move the paddle</p>
            <button id="start-button">Start Game</button>
        </div>
        
        <div id="game-over-screen">
            <h1>GAME OVER</h1>
            <p id="final-score">Your score: 0</p>
            <button id="restart-button">Play Again</button>
        </div>
    </div>

    <script>
        // Game elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const finalScoreDisplay = document.getElementById('final-score');
        
        // Game variables
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let animationId;
        
        // Paddle properties
        const paddleHeight = 10;
        const paddleWidth = 80;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let rightPressed = false;
        let leftPressed = false;
        let mouseX = 0;
        
        // Ball properties
        const ballRadius = 8;
        let ballX = canvas.width / 2;
        let ballY = canvas.height - 30;
        let ballSpeedX = 4;
        let ballSpeedY = -4;
        
        // Brick properties
        const brickRowCount = 5;
        const brickColumnCount = 9;
        const brickWidth = 60;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 60;
        const brickOffsetLeft = 30;
        
        // Create bricks
        const bricks = [];
        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = { x: 0, y: 0, status: 1 };
            }
        }
        
        // Event listeners
        document.addEventListener('keydown', keyDownHandler);
        document.addEventListener('keyup', keyUpHandler);
        canvas.addEventListener('mousemove', mouseMoveHandler);
        startButton.addEventListener('click', startGame);
        restartButton.addEventListener('click', restartGame);
        
        // Event handlers
        function keyDownHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = true;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = true;
            }
        }
        
        function keyUpHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = false;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = false;
            }
        }
        
        function mouseMoveHandler(e) {
            const relativeX = e.clientX - canvas.offsetLeft;
            if (relativeX > 0 && relativeX < canvas.width) {
                mouseX = relativeX - paddleWidth / 2;
            }
        }
        
        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            resetGame();
            draw();
        }
        
        function restartGame() {
            gameOverScreen.style.display = 'none';
            score = 0;
            lives = 3;
            updateScore();
            resetGame();
            draw();
        }
        
        function resetGame() {
            // Reset ball position
            ballX = canvas.width / 2;
            ballY = canvas.height - 30;
            ballSpeedX = 4;
            ballSpeedY = -4;
            
            // Reset paddle position
            paddleX = (canvas.width - paddleWidth) / 2;
            
            // Reset bricks
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r].status = 1;
                }
            }
        }
        
        function updateScore() {
            scoreDisplay.textContent = `Score: ${score}`;
            livesDisplay.textContent = `Lives: ${lives}`;
        }
        
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const brick = bricks[c][r];
                    if (brick.status === 1) {
                        if (
                            ballX > brick.x &&
                            ballX < brick.x + brickWidth &&
                            ballY > brick.y &&
                            ballY < brick.y + brickHeight
                        ) {
                            ballSpeedY = -ballSpeedY;
                            brick.status = 0;
                            score += 10;
                            updateScore();
                            
                            // Check if all bricks are destroyed
                            if (checkWin()) {
                                gameRunning = false;
                                finalScoreDisplay.textContent = `You Win! Final Score: ${score}`;
                                gameOverScreen.style.display = 'flex';
                                cancelAnimationFrame(animationId);
                            }
                        }
                    }
                }
            }
        }
        
        function checkWin() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        return false;
                    }
                }
            }
            return true;
        }
        
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#0095DD';
            ctx.fill();
            ctx.closePath();
        }
        
        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 10, paddleWidth, paddleHeight);
            ctx.fillStyle = '#0095DD';
            ctx.fill();
            ctx.closePath();
        }
        
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        
                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = [
                            '#FF5733', 
                            '#33FF57', 
                            '#3357FF', 
                            '#F3FF33', 
                            '#FF33F3'
                        ][r % 5];
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }
        
        function draw() {
            if (!gameRunning) return;
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw game elements
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();
            
            // Ball movement
            ballX += ballSpeedX;
            ballY += ballSpeedY;
            
            // Wall collision (left/right)
            if (ballX + ballSpeedX > canvas.width - ballRadius || ballX + ballSpeedX < ballRadius) {
                ballSpeedX = -ballSpeedX;
            }
            
            // Wall collision (top)
            if (ballY + ballSpeedY < ballRadius) {
                ballSpeedY = -ballSpeedY;
            }
            
            // Paddle collision
            if (
                ballY + ballSpeedY > canvas.height - ballRadius - paddleHeight - 10 &&
                ballX > paddleX &&
                ballX < paddleX + paddleWidth
            ) {
                // Calculate bounce angle based on where ball hits paddle
                const hitPosition = (ballX - (paddleX + paddleWidth / 2)) / (paddleWidth / 2);
                ballSpeedX = hitPosition * 5; // Adjust this value to change the angle
                ballSpeedY = -Math.abs(ballSpeedY); // Ensure the ball always bounces upward
            }
            
            // Bottom wall collision (lose life)
            if (ballY + ballSpeedY > canvas.height - ballRadius) {
                lives--;
                updateScore();
                
                if (lives <= 0) {
                    gameRunning = false;
                    finalScoreDisplay.textContent = `Game Over! Final Score: ${score}`;
                    gameOverScreen.style.display = 'flex';
                    cancelAnimationFrame(animationId);
                } else {
                    // Reset ball position
                    ballX = canvas.width / 2;
                    ballY = canvas.height - 30;
                    ballSpeedX = 4;
                    ballSpeedY = -4;
                    paddleX = (canvas.width - paddleWidth) / 2;
                }
            }
            
            // Paddle movement
            if (rightPressed && paddleX < canvas.width - paddleWidth) {
                paddleX += 7;
            } else if (leftPressed && paddleX > 0) {
                paddleX -= 7;
            }
            
            // Mouse control
            if (mouseX > 0 && mouseX < canvas.width - paddleWidth) {
                paddleX = mouseX;
            }
            
            animationId = requestAnimationFrame(draw);
        }
    </script>
</body>
</html>
