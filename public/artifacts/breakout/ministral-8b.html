<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #222;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        #game-container {
            position: relative;
        }

        #game-canvas {
            background-color: #000;
            display: block;
        }

        #score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        #lives-display {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            color: white;
            text-shadow: 1px 1px 2px black;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            text-align: center;
            display: none;
        }

        #restart-btn {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }

        #restart-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas" width="600" height="400"></canvas>
        <div id="score-display">Score: 0</div>
        <div id="lives-display">Lives: 3</div>
        <div id="game-over">GAME OVER</div>
        <button id="restart-btn">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const livesDisplay = document.getElementById('lives-display');
        const gameOverDisplay = document.getElementById('game-over');
        const restartBtn = document.getElementById('restart-btn');

        // Game variables
        let score = 0;
        let lives = 3;
        let bricks = [];
        let ball;
        let paddle;
        let brickRowCount = 5;
        let brickColumnCount = 9;
        let brickWidth = 75;
        let brickHeight = 20;
        let brickPadding = 10;
        let brickOffsetTop = 60;
        let brickOffsetLeft = 30;
        let rightPressed = false;
        let leftPressed = false;
        let gameRunning = true;

        // Initialize game
        function initGame() {
            // Create paddle
            paddle = {
                x: canvas.width / 2 - 50,
                y: canvas.height - 30,
                width: 100,
                height: 10,
                speed: 8
            };

            // Create ball
            ball = {
                x: canvas.width / 2,
                y: canvas.height - 20,
                radius: 10,
                speed: 5,
                dx: 5,
                dy: -5
            };

            // Create bricks
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }

            // Reset game state
            score = 0;
            lives = 3;
            gameRunning = true;
            scoreDisplay.textContent = `Score: ${score}`;
            livesDisplay.textContent = `Lives: ${lives}`;
            gameOverDisplay.style.display = 'none';
            restartBtn.style.display = 'none';
        }

        // Draw paddle
        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddle.x, paddle.y, paddle.width, paddle.height);
            ctx.fillStyle = '#0095DD';
            ctx.fill();
            ctx.closePath();
        }

        // Draw ball
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#FF0000';
            ctx.fill();
            ctx.closePath();
        }

        // Draw bricks
        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        const brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;

                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = getBrickColor(r);
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        // Get brick color based on row
        function getBrickColor(row) {
            const colors = ['#FF5252', '#FF8A80', '#FFB7B2', '#C2FF59', '#A5D6A7'];
            return colors[row % colors.length];
        }

        // Draw score and lives
        function drawScore() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#0095DD";
            ctx.fillText(`Score: ${score}`, 8, 20);
        }

        function drawLives() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#0095DD";
            ctx.fillText(`Lives: ${lives}`, canvas.width - 120, 20);
        }

        // Collision detection
        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const brick = bricks[c][r];
                    if (brick.status === 1) {
                        if (
                            ball.x > brick.x &&
                            ball.x < brick.x + brickWidth &&
                            ball.y > brick.y &&
                            ball.y < brick.y + brickHeight
                        ) {
                            ball.dy = -ball.dy;
                            brick.status = 0;
                            score += 10;

                            // Check if all bricks are destroyed
                            if (checkWin()) {
                                gameOverDisplay.textContent = "YOU WIN!";
                                gameOverDisplay.style.display = 'block';
                                restartBtn.style.display = 'block';
                                gameRunning = false;
                            }

                            scoreDisplay.textContent = `Score: ${score}`;
                        }
                    }
                }
            }

            // Wall collision
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }

            // Paddle collision
            if (
                ball.y + ball.radius > paddle.y &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width
            ) {
                // Calculate angle based on where ball hits paddle
                const hitPosition = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
                const bounceAngle = hitPosition * (Math.PI / 4); // 45 degrees max angle

                // Calculate new velocity components
                const speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy);
                ball.dx = speed * Math.sin(bounceAngle);
                ball.dy = -speed * Math.cos(bounceAngle);
            }

            // Bottom wall collision (lose life)
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                livesDisplay.textContent = `Lives: ${lives}`;

                if (lives <= 0) {
                    gameOverDisplay.textContent = "GAME OVER";
                    gameOverDisplay.style.display = 'block';
                    restartBtn.style.display = 'block';
                    gameRunning = false;
                } else {
                    // Reset ball position and direction
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height - 20;
                    ball.dx = (Math.random() * 6 - 3);
                    ball.dy = -5;
                }
            }
        }

        // Check if all bricks are destroyed
        function checkWin() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        return false;
                    }
                }
            }
            return true;
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw game elements
            drawBricks();
            drawBall();
            drawPaddle();
            drawScore();
            drawLives();

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Collision detection
            if (gameRunning) {
                collisionDetection();
            }
        }

        // Keyboard controls
        document.addEventListener('keydown', keyDownHandler);
        document.addEventListener('keyup', keyUpHandler);

        function keyDownHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = true;
            }
            else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = true;
            }
        }

        function keyUpHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = false;
            }
            else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = false;
            }
        }

        // Paddle movement
        function paddleMovement() {
            if (rightPressed && paddle.x < canvas.width - paddle.width) {
                paddle.x += paddle.speed;
            }
            else if (leftPressed && paddle.x > 0) {
                paddle.x -= paddle.speed;
            }
        }

        // Game loop
        function gameLoop() {
            if (gameRunning) {
                paddleMovement();
                draw();
            }
            requestAnimationFrame(gameLoop);
        }

        // Restart game
        restartBtn.addEventListener('click', initGame);

        // Start game
        initGame();
        gameLoop();
    </script>
</body>
</html>
