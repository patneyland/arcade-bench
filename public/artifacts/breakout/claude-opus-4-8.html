<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1e1e2f, #2d2d44);
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #fff;
    }
    h1 {
        margin-bottom: 10px;
        text-shadow: 0 0 10px rgba(0, 200, 255, 0.7);
        letter-spacing: 4px;
    }
    #hud {
        display: flex;
        gap: 40px;
        margin-bottom: 12px;
        font-size: 18px;
    }
    #hud span {
        color: #00e0ff;
    }
    canvas {
        background: #0a0a1a;
        border: 2px solid #00e0ff;
        border-radius: 8px;
        box-shadow: 0 0 25px rgba(0, 200, 255, 0.4);
        display: block;
    }
    #message {
        margin-top: 15px;
        font-size: 20px;
        min-height: 26px;
        text-align: center;
    }
    #hint {
        margin-top: 8px;
        font-size: 14px;
        color: #888;
    }
    button {
        margin-top: 12px;
        padding: 10px 26px;
        font-size: 16px;
        background: #00e0ff;
        color: #0a0a1a;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover {
        box-shadow: 0 0 15px rgba(0, 200, 255, 0.8);
        transform: translateY(-2px);
    }
</style>
</head>
<body>
    <h1>BREAKOUT</h1>
    <div id="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Lives: <span id="lives">3</span></div>
        <div>Level: <span id="level">1</span></div>
    </div>
    <canvas id="game" width="600" height="500"></canvas>
    <div id="message"></div>
    <div id="hint">Move: Mouse / Arrow Keys &nbsp;|&nbsp; Launch: Space / Click</div>
    <button id="startBtn">Start Game</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
const messageEl = document.getElementById('message');
const startBtn = document.getElementById('startBtn');

// Game state
let paddle, ball, bricks, score, lives, level, running, launched;
let keys = { left: false, right: false };

const BRICK_ROWS = 5;
const BRICK_COLS = 10;
const BRICK_PAD = 4;
const BRICK_TOP = 50;
const BRICK_LEFT = 25;
const BRICK_W = (W - BRICK_LEFT * 2 - BRICK_PAD * (BRICK_COLS - 1)) / BRICK_COLS;
const BRICK_H = 20;

const COLORS = ['#ff5252', '#ffb142', '#ffeb3b', '#4caf50', '#00e0ff'];

function initPaddle() {
    paddle = { w: 90, h: 12, x: W / 2 - 45, y: H - 30, speed: 7 };
}

function initBall() {
    ball = {
        x: W / 2,
        y: paddle.y - 10,
        r: 8,
        dx: 4 * (Math.random() > 0.5 ? 1 : -1),
        dy: -4,
        speed: 4 + (level - 1) * 0.6
    };
    launched = false;
}

function initBricks() {
    bricks = [];
    for (let r = 0; r < BRICK_ROWS; r++) {
        for (let c = 0; c < BRICK_COLS; c++) {
            bricks.push({
                x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD),
                y: BRICK_TOP + r * (BRICK_H + BRICK_PAD),
                w: BRICK_W,
                h: BRICK_H,
                color: COLORS[r % COLORS.length],
                points: (BRICK_ROWS - r) * 10,
                alive: true
            });
        }
    }
}

function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    updateHUD();
    startLevel();
    running = true;
    messageEl.textContent = '';
    startBtn.style.display = 'none';
    requestAnimationFrame(loop);
}

function startLevel() {
    initPaddle();
    initBall();
    initBricks();
    updateHUD();
}

function updateHUD() {
    scoreEl.textContent = score;
    livesEl.textContent = lives;
    levelEl.textContent = level;
}

function loseLife() {
    lives--;
    updateHUD();
    if (lives <= 0) {
        gameOver(false);
    } else {
        initPaddle();
        initBall();
    }
}

function gameOver(won) {
    running = false;
    messageEl.textContent = won ? '🎉 You Won! Amazing!' : '💀 Game Over!';
    startBtn.textContent = 'Play Again';
    startBtn.style.display = 'inline-block';
}

function nextLevel() {
    level++;
    if (level > 5) {
        gameOver(true);
    } else {
        messageEl.textContent = 'Level ' + level + '!';
        setTimeout(() => { if (running) messageEl.textContent = ''; }, 1200);
        startLevel();
    }
}

// Input
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') keys.left = true;
    if (e.key === 'ArrowRight') keys.right = true;
    if (e.key === ' ') { launched = true; e.preventDefault(); }
});
document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft') keys.left = false;
    if (e.key === 'ArrowRight') keys.right = false;
});
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    if (paddle) {
        paddle.x = mx - paddle.w / 2;
        clampPaddle();
    }
});
canvas.addEventListener('click', () => { launched = true; });

function clampPaddle() {
    if (paddle.x < 0) paddle.x = 0;
    if (paddle.x + paddle.w > W) paddle.x = W - paddle.w;
}

function update() {
    // Paddle movement (keyboard)
    if (keys.left) paddle.x -= paddle.speed;
    if (keys.right) paddle.x += paddle.speed;
    clampPaddle();

    if (!launched) {
        ball.x = paddle.x + paddle.w / 2;
        ball.y = paddle.y - ball.r - 1;
        return;
    }

    ball.x += ball.dx;
    ball.y += ball.dy;

    // Wall collisions
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx *= -1; }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx *= -1; }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy *= -1; }

    // Bottom - lose life
    if (ball.y - ball.r > H) {
        loseLife();
        return;
    }

    // Paddle collision
    if (ball.dy > 0 &&
        ball.y + ball.r >= paddle.y &&
        ball.y + ball.r <= paddle.y + paddle.h + Math.abs(ball.dy) &&
        ball.x >= paddle.x &&
        ball.x <= paddle.x + paddle.w) {
        ball.y = paddle.y - ball.r;
        // Angle based on where it hits the paddle
        const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
        const angle = hit * (Math.PI / 3); // max 60 degrees
        const spd = ball.speed;
        ball.dx = spd * Math.sin(angle);
        ball.dy = -spd * Math.cos(angle);
    }

    // Brick collisions
    let remaining = 0;
    for (const b of bricks) {
        if (!b.alive) continue;
        remaining++;
        if (ball.x + ball.r > b.x &&
            ball.x - ball.r < b.x + b.w &&
            ball.y + ball.r > b.y &&
            ball.y - ball.r < b.y + b.h) {
            b.alive = false;
            remaining--;
            score += b.points;
            updateHUD();

            // Determine bounce direction
            const overlapLeft = (ball.x + ball.r) - b.x;
            const overlapRight = (b.x + b.w) - (ball.x - ball.r);
            const overlapTop = (ball.y + ball.r) - b.y;
            const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
            const minX = Math.min(overlapLeft, overlapRight);
            const minY = Math.min(overlapTop, overlapBottom);
            if (minX < minY) ball.dx *= -1;
            else ball.dy *= -1;
            break;
        }
    }

    if (remaining === 0) {
        nextLevel();
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // Bricks
    for (const b of bricks) {
        if (!b.alive) continue;
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, b.y, b.w, b.h);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fillRect(b.x, b.y, b.w, 4);
    }

    // Paddle
    ctx.fillStyle = '#00e0ff';
    ctx.shadowColor = '#00e0ff';
    ctx.shadowBlur = 10;
    roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Ball
    ctx.beginPath();
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 12;
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (!launched && running) {
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '16px Segoe UI';
        ctx.textAlign = 'center';
        ctx.fillText('Press SPACE or Click to Launch', W / 2, H / 2);
    }
}

function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
}

function loop() {
    if (!running) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

startBtn.addEventListener('click', startGame);

// Initial draw
initPaddle();
initBall();
level = 1;
initBricks();
draw();
</script>
</body>
</html>
