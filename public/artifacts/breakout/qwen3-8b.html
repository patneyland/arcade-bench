<!DOCTYPE html>
<html>
<head>
    <title>Breakout Game</title>
    <style>
        body {
            background-color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        canvas {
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <canvas id="game" width="480" height="320"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        let ball = {
            x: canvas.width / 2,
            y: canvas.height - 30,
            radius: 10,
            dx: 2,
            dy: -2
        };

        let paddle = {
            x: canvas.width / 2 - 40,
            y: canvas.height - 20,
            width: 80,
            height: 10,
            dx: 0
        };

        let bricks = [];
        const brickRowCount = 5;
        const brickColumnCount = 10;
        const brickWidth = 75;
        const brickHeight = 20;
        const brickPadding = 10;
        const brickOffsetTop = 30;
        const brickOffsetLeft = 30;

        for (let c = 0; c < brickColumnCount; c++) {
            bricks[c] = [];
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r] = {
                    x: 0,
                    y: 0,
                    status: true
                };
            }
        }

        for (let c = 0; c < brickColumnCount; c++) {
            for (let r = 0; r < brickRowCount; r++) {
                bricks[c][r].x = c * (brickWidth + brickPadding) + brickOffsetLeft;
                bricks[c][r].y = r * (brickHeight + brickPadding) + brickOffsetTop;
            }
        }

        let score = 0;
        let lives = 3;

        document.addEventListener('keydown', keyDownHandler, false);
        document.addEventListener('keyup', keyUpHandler, false);

        let rightPressed = false;
        let leftPressed = false;

        function keyDownHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = true;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = true;
            }
        }

        function keyUpHandler(e) {
            if (e.key === 'Right' || e.key === 'ArrowRight') {
                rightPressed = false;
            } else if (e.key === 'Left' || e.key === 'ArrowLeft') {
                leftPressed = false;
            }
        }

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw score and lives
            ctx.font = '16px Arial';
            ctx.fillStyle = '#000';
            ctx.fillText('Score: ' + score, 8, 20);
            ctx.fillText('Lives: ' + lives, 8, 40);

            // Draw ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#0095DD';
            ctx.fill();
            ctx.closePath();

            // Draw paddle
            ctx.fillStyle = '#0095DD';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);

            // Draw bricks
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status) {
                        ctx.fillStyle = '#0095DD';
                        ctx.fillRect(bricks[c][r].x, bricks[c][r].y, brickWidth, brickHeight);
                    }
                }
            }

            // Update paddle position
            paddle.x += paddle.dx;

            // Check paddle boundaries
            if (paddle.x + paddle.width > canvas.width) {
                paddle.x = canvas.width - paddle.width;
            }
            if (paddle.x < 0) {
                paddle.x = 0;
            }

            // Update ball position
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Collision with walls
            if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
                ball.dx = -ball.dx;
            }
            if (ball.y - ball.radius < 0) {
                ball.dy = -ball.dy;
            }

            // Collision with paddle
            if (ball.y + ball.radius > paddle.y && ball.y + ball.radius < paddle.y + paddle.height) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    ball.dy = -ball.dy;
                }
            }

            // Collision with bricks
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status) {
                        if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            b.status = false;
                            score += 10;
                            break;
                        }
                    }
                }
            }

            // Check if ball is out of bounds
            if (ball.y + ball.radius > canvas.height) {
                // Lose a life
                lives--;
                if (lives === 0) {
                    // Game over
                    alert('Game Over! Press OK to restart.');
                    document.location.reload();
                } else {
                    // Reset ball
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height - 30;
                    ball.dx = 2;
                    ball.dy = -2;
                }
            }

            // Check if all bricks are destroyed
            let allBricksDestroyed = true;
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status) {
                        allBricksDestroyed = false;
                        break;
                    }
                }
                if (!allBricksDestroyed) break;
            }
            if (allBricksDestroyed) {
                alert('You won! Press OK to restart.');
                document.location.reload();
            }

            requestAnimationFrame(draw);
        }

        // Set initial paddle dx based on keys
        // Start the game loop
        draw();
    </script>
</body>
</html>
