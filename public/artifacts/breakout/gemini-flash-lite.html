<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000;
        }
        canvas {
            border: 2px solid #fff;
            background-color: #111;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="600" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game State Variables
        let ballX = canvas.width / 2;
        let ballY = canvas.height - 30;
        let ballRadius = 7;
        let ballSpeedX = 3;
        let ballSpeedY = -3;

        let paddleWidth = 75;
        let paddleHeight = 10;
        let paddleX = (canvas.width - paddleWidth) / 2;
        let paddleSpeed = 5;
        let paddleMoveLeft = false;
        let paddleMoveRight = false;

        let brickRowCount = 5;
        let brickColumnCount = 5;
        let brickWidth = 75;
        let brickHeight = 20;
        let brickPadding = 10;
        let brickOffsetTop = 30;
        let brickOffsetLeft = 30;
        let bricks = [];

        let score = 0;
        let lives = 3;
        let maxScore = 0; // Track max possible score

        // Colors
        const ballColor = "#0095DD";
        const paddleColor = "#0095DD";
        const brickColors = ["#FF6347", "#32CD32", "#FFD700", "#4682B4", "#DA70D6"]; // Tomato, LimeGreen, Gold, SteelBlue, Orchid

        // Initialize Bricks
        function initializeBricks() {
            bricks = [];
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1, color: brickColors[(c + r) % brickColors.length] };
                }
            }
            maxScore = brickRowCount * brickColumnCount;
        }

        // Draw Functions
        function drawBall() {
            ctx.beginPath();
            ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = ballColor;
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.rect(paddleX, canvas.height - paddleHeight - 5, paddleWidth, paddleHeight);
            ctx.fillStyle = paddleColor;
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        const brickX = (c * (brickWidth + brickPadding)) + brickOffsetLeft;
                        const brickY = (r * (brickHeight + brickPadding)) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;

                        ctx.beginPath();
                        ctx.rect(brickX, brickY, brickWidth, brickHeight);
                        ctx.fillStyle = bricks[c][r].color;
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function drawScore() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText("Score: " + score, 8, 20);
        }

        function drawLives() {
            ctx.font = "16px Arial";
            ctx.fillStyle = "#fff";
            ctx.fillText("Lives: " + lives, canvas.width - 65, 20);
        }

        // Game Logic Functions
        function moveBall() {
            ballX += ballSpeedX;
            ballY += ballSpeedY;

            // Wall collisions
            if (ballX + ballRadius > canvas.width || ballX - ballRadius < 0) {
                ballSpeedX = -ballSpeedX;
            }
            if (ballY - ballRadius < 0) {
                ballSpeedY = -ballSpeedY;
            }

            // Paddle collision
            if (ballY + ballRadius > canvas.height - paddleHeight - 5 &&
                ballY + ballRadius < canvas.height - 5 &&
                ballX > paddleX &&
                ballX < paddleX + paddleWidth) {
                ballSpeedY = -ballSpeedY;
            }

            // Ball drops (lose a life)
            if (ballY + ballRadius > canvas.height) {
                lives--;
                if (lives < 1) {
                    gameOver();
                } else {
                    resetBallAndPaddle();
                }
            }
        }

        function movePaddle() {
            if (paddleMoveLeft && paddleX > 0) {
                paddleX -= paddleSpeed;
            } else if (paddleMoveRight && paddleX < canvas.width - paddleWidth) {
                paddleX += paddleSpeed;
            }
        }

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    const brick = bricks[c][r];
                    if (brick.status === 1) {
                        if (ballX + ballRadius > brick.x &&
                            ballX - ballRadius < brick.x + brickWidth &&
                            ballY + ballRadius > brick.y &&
                            ballY - ballRadius < brick.y + brickHeight) {

                            ballSpeedY = -ballSpeedY;
                            brick.status = 0;
                            score++;

                            if (score === maxScore) {
                                winGame();
                            }
                        }
                    }
                }
            }
        }

        function resetBallAndPaddle() {
            ballX = canvas.width / 2;
            ballY = canvas.height - 30;
            ballSpeedX = 3 * (Math.random() > 0.5 ? 1 : -1); // Randomize direction
            ballSpeedY = -3;
            paddleX = (canvas.width - paddleWidth) / 2;
        }

        function gameOver() {
            alert("GAME OVER! Your score: " + score);
            document.location.reload(); // Reload the page to restart
        }

        function winGame() {
            alert("YOU WIN, CONGRATULATIONS! Score: " + score);
            document.location.reload(); // Reload the page to restart
        }

        // Event Listeners for Paddle Control
        document.addEventListener("keydown", keyDownHandler, false);
        document.addEventListener("keyup", keyUpHandler, false);

        function keyDownHandler(e) {
            if (e.key === "ArrowLeft" || e.key === "a") {
                paddleMoveLeft = true;
            } else if (e.key === "ArrowRight" || e.key === "d") {
                paddleMoveRight = true;
            }
        }

        function keyUpHandler(e) {
            if (e.key === "ArrowLeft" || e.key === "a") {
                paddleMoveLeft = false;
            } else if (e.key === "ArrowRight" || e.key === "d") {
                paddleMoveRight = false;
            }
        }

        // Main Game Loop
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw game elements
            drawBricks();
            drawBall();
            drawPaddle();
            drawScore();
            drawLives();

            // Update game state
            moveBall();
            movePaddle();
            collisionDetection();

            // Request next frame
            requestAnimationFrame(draw);
        }

        // Start the game
        initializeBricks();
        draw();

    </script>
</body>
</html>
